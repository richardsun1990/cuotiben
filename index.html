<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>错题本</title>
<style>
/* ── TOKENS ──────────────────────────────────── */
:root{
  --bg:#F2F1F6;--bg2:#E8E7ED;
  --surface:#FFFFFF;--surface2:#F7F7F8;
  --border:rgba(60,60,67,.12);--border2:rgba(60,60,67,.07);
  --label:#1C1C1E;--label2:#3C3C43;
  --label3:rgba(60,60,67,.60);--label4:rgba(60,60,67,.36);
  --accent:#4F46E5;--accent-bg:rgba(79,70,229,.09);
  --red:#FF3B30;--red-bg:rgba(255,59,48,.10);
  --orange:#FF9500;--orange-bg:rgba(255,149,0,.10);
  --green:#34C759;--green-bg:rgba(52,199,89,.10);
  --r-sm:8px;--r-md:13px;--r-lg:18px;--r-xl:22px;
  --spring:cubic-bezier(.34,1.56,.64,1);
  --out:cubic-bezier(.25,.46,.45,.94);
  --sb-w:228px;
  --font:-apple-system,"SF Pro Text","PingFang SC",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--label);display:flex;flex-direction:column;}
input,textarea,select,button{font-family:inherit;}
textarea{resize:none;}
button{cursor:pointer;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── TOPBAR ──────────────────────────────────── */
.topbar{
  height:52px;flex-shrink:0;z-index:30;
  background:rgba(242,241,246,.9);
  backdrop-filter:saturate(180%) blur(24px);
  -webkit-backdrop-filter:saturate(180%) blur(24px);
  border-bottom:.5px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px;
}
.tb-sb-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:transparent;color:var(--accent);
  font-size:19px;display:flex;align-items:center;justify-content:center;
  transition:background .12s;flex-shrink:0;
}
.tb-sb-btn:active{background:var(--accent-bg);}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-.3px;flex:1;}
.tb-more{display:flex;align-items:center;padding:7px 13px;border-radius:20px;border:.5px solid var(--border);background:var(--surface);color:var(--label2);font-size:14px;transition:background .12s;}
.tb-more:active{background:var(--bg2);}
.tb-add{display:flex;align-items:center;gap:5px;padding:7px 16px;border-radius:20px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:500;transition:opacity .15s,transform .15s var(--spring);}
.tb-add:active{opacity:.82;transform:scale(.97);}

/* ── LAYOUT ──────────────────────────────────── */
.layout{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── SIDEBAR OVERLAY (portrait) ──────────────── */
.sb-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0);z-index:25;
  transition:background .28s var(--out);
  pointer-events:none;
}
.sb-overlay.vis{display:block;pointer-events:auto;}
.sb-overlay.dim{background:rgba(0,0,0,.28);}

/* ── SIDEBAR ─────────────────────────────────── */
.sidebar{
  width:var(--sb-w);background:var(--surface);
  border-right:.5px solid var(--border);
  display:flex;flex-direction:column;
  flex-shrink:0;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  transition:transform .32s var(--spring);
  will-change:transform;
  /* portrait: slide off-screen */
}
/* landscape: always visible inline */
@media (orientation:landscape){
  .sidebar{position:relative;transform:none!important;z-index:1;}
  .sb-overlay{display:none!important;}
  .tb-sb-btn{display:none;}  /* hide hamburger in landscape */
}
/* portrait: overlay drawer */
@media (orientation:portrait){
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;
    z-index:26;
    transform:translateX(calc(-1 * var(--sb-w)));
  }
  .sidebar.open{transform:translateX(0);}
}

.sb-sect{padding:18px 12px 4px;}
.sb-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--label4);padding:0 6px;margin-bottom:4px;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-md);cursor:pointer;font-size:15px;color:var(--label);letter-spacing:-.1px;margin-bottom:1px;transition:background .12s var(--out);user-select:none;}
.sb-item:active{background:var(--bg2)!important;}
.sb-item.on{background:var(--accent-bg);color:var(--accent);font-weight:500;}
.sb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sb-cnt{margin-left:auto;font-size:13px;color:var(--label4);min-width:16px;text-align:right;}
.sb-item.on .sb-cnt{color:var(--accent);opacity:.7;}
.sb-div{height:.5px;background:var(--border);margin:8px 12px;}
.sb-stats{margin:6px 12px 16px;background:var(--surface2);border-radius:var(--r-md);padding:12px 14px;}
.sb-stat{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px;color:var(--label3);}
.sb-stat+.sb-stat{border-top:.5px solid var(--border2);margin-top:3px;padding-top:6px;}
.sb-sv{font-weight:600;font-size:14px;}

/* swipe-to-open edge target (portrait only) */
.sb-edge{
  display:none;
  position:fixed;left:0;top:0;bottom:0;width:20px;z-index:24;
}
@media (orientation:portrait){.sb-edge{display:block;}}

/* ── MAIN ────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.tabs{display:flex;border-bottom:.5px solid var(--border);background:var(--surface);padding:0 16px;flex-shrink:0;}
.tab-i{padding:12px 13px;font-size:14px;letter-spacing:-.1px;color:var(--label3);border-bottom:2px solid transparent;margin-bottom:-.5px;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap;user-select:none;}
.tab-i.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border-bottom:.5px solid var(--border2);flex-shrink:0;}
.srch-box{flex:1;display:flex;align-items:center;gap:7px;background:var(--bg);border-radius:var(--r-sm);padding:7px 11px;}
.srch-box input{flex:1;border:none;background:transparent;font-size:15px;color:var(--label);outline:none;}
.srch-box input::placeholder{color:var(--label4);}
.sort-btn{padding:7px 12px;border-radius:var(--r-sm);border:.5px solid var(--border);background:var(--surface);font-size:13px;color:var(--label2);white-space:nowrap;transition:background .12s;}
.sort-btn:active{background:var(--bg2);}
.cards-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:12px;}

/* ── CARD ────────────────────────────────────── */
.card{background:var(--surface);border-radius:var(--r-lg);border:.5px solid var(--border2);overflow:hidden;transition:transform .18s var(--spring),box-shadow .18s var(--out);will-change:transform;animation:cardIn .26s var(--spring) both;}
@keyframes cardIn{from{opacity:0;transform:scale(.94) translateY(6px);}to{opacity:1;transform:scale(1) translateY(0);}}
.card:active{transform:scale(.975);box-shadow:0 2px 8px rgba(0,0,0,.07);}
.card-head{padding:13px 14px 9px;display:flex;align-items:center;gap:8px;}
.sub-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;flex-shrink:0;}
.st-pill{margin-left:auto;display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;flex-shrink:0;}
.st-wrong{background:var(--red-bg);color:var(--red);}
.st-review{background:var(--orange-bg);color:var(--orange);}
.st-done{background:var(--green-bg);color:var(--green);}
.card-body{padding:0 14px 10px;}
.card-q{font-size:14px;line-height:1.55;color:var(--label);letter-spacing:-.1px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;}
.card-tag{display:inline-block;font-size:11px;color:var(--label3);background:var(--surface2);padding:2px 8px;border-radius:6px;margin:0 4px 4px 0;}
.card-foot{display:flex;align-items:center;gap:6px;padding:8px 14px 10px;border-top:.5px solid var(--border2);font-size:12px;color:var(--label4);}
.card-dot{width:3px;height:3px;border-radius:50%;background:var(--label4);}
.card-ans-badge{margin-left:auto;font-size:11px;color:var(--accent);font-weight:500;}
.card-acts{display:flex;border-top:.5px solid var(--border2);}
.c-btn{flex:1;padding:10px 4px;text-align:center;font-size:13px;color:var(--label3);border:none;background:transparent;transition:background .12s;letter-spacing:-.1px;}
.c-btn+.c-btn{border-left:.5px solid var(--border2);}
.c-btn:active{background:var(--bg2);}
.c-btn.p{color:var(--accent);font-weight:500;}
.c-btn.d{color:var(--red);}

/* ── EMPTY ───────────────────────────────────── */
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:80px 40px;text-align:center;}
.empty-icon{font-size:50px;margin-bottom:4px;}
.empty-title{font-size:18px;font-weight:600;color:var(--label2);letter-spacing:-.3px;}
.empty-desc{font-size:14px;color:var(--label3);line-height:1.6;max-width:230px;}
.empty-btn{margin-top:8px;padding:10px 22px;border-radius:22px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:500;}
.empty-btn:active{opacity:.8;}

/* ── BOTTOM SHEET ────────────────────────────── */
.sheet-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;align-items:flex-end;justify-content:center;transition:background .28s var(--out);}
.sheet-ov.open{display:flex;background:rgba(0,0,0,.32);}
.sheet{background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:660px;max-height:93dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .36s var(--spring);overflow:hidden;}
.sheet-ov.open .sheet{transform:translateY(0);}
.sheet-grab{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;flex-shrink:0;border-bottom:.5px solid var(--border2);}
.sheet-title{font-size:18px;font-weight:700;letter-spacing:-.4px;}
.sheet-x{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:none;color:var(--label3);font-size:16px;display:flex;align-items:center;justify-content:center;}
.sheet-x:active{background:var(--border);}
.sheet-body{padding:16px 20px 32px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.fg{margin-bottom:17px;}
.fl{display:block;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--label3);margin-bottom:7px;}
.fi{width:100%;padding:12px 14px;border-radius:var(--r-md);border:.5px solid var(--border);background:var(--bg);font-size:16px;color:var(--label);outline:none;transition:border-color .15s,background .15s,box-shadow .15s;-webkit-appearance:none;}
.fi:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-bg);}
.fi::placeholder{color:var(--label4);}
textarea.fi{line-height:1.55;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.st-picker{display:flex;gap:8px;}
.st-opt{flex:1;padding:10px 6px;text-align:center;border-radius:var(--r-md);border:1.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s var(--out);background:var(--surface);color:var(--label3);}
.st-opt.sw{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.st-opt.sr{background:var(--orange-bg);border-color:var(--orange);color:var(--orange);}
.st-opt.sd{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.save-btn{width:100%;padding:14px;border-radius:var(--r-md);border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:600;margin-top:4px;transition:opacity .15s,transform .15s var(--spring);}
.save-btn:active{opacity:.83;transform:scale(.98);}

/* ── PENCIL PANEL ────────────────────────────── */
.pp{display:none;position:fixed;inset:0;background:#1C1C1E;z-index:300;flex-direction:column;}
.pp.open{display:flex;animation:ppIn .26s var(--spring);}
@keyframes ppIn{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:scale(1);}}

/* Nav bar */
.pp-nav{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(28,28,30,.97);backdrop-filter:blur(20px);border-bottom:.5px solid rgba(255,255,255,.07);flex-shrink:0;}
.pp-q{flex:1;font-size:13px;color:rgba(235,235,245,.65);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pb{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,.08);color:rgba(235,235,245,.9);font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s,transform .1s var(--spring);}
.pb:active{background:rgba(255,255,255,.18);transform:scale(.91);}
.pb.on{background:var(--accent);color:#fff;}
.pp-sep{width:.5px;height:20px;background:rgba(255,255,255,.1);flex-shrink:0;margin:0 2px;}

/* Tool bar */
.pp-tools{background:#2C2C2E;border-bottom:.5px solid rgba(255,255,255,.05);padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.pp-sep2{width:.5px;height:22px;background:rgba(255,255,255,.1);margin:0 2px;}
.pc{width:26px;height:26px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;flex-shrink:0;transition:border-color .12s,transform .15s var(--spring);}
.pc:active{transform:scale(.86);}
.pc.on{border-color:#fff;transform:scale(1.1);}
.sz-lbl{font-size:11px;color:rgba(235,235,245,.38);white-space:nowrap;}
.sz-sl{width:70px;accent-color:var(--accent);}
.sz-val{font-size:12px;color:rgba(235,235,245,.38);min-width:18px;}

/* ── CANVAS CONTAINER — resizable & draggable ── */
.pp-stage{
  flex:1;position:relative;overflow:hidden;
  background:#EFEFEF;
  /* subtle grid */
  background-image:
    linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);
  background-size:40px 40px;
}

/* The floating canvas panel */
.cv-panel{
  position:absolute;
  /* default: full stage */
  inset:0;
  background:#FAFAF8;
  border-radius:0;
  box-shadow:none;
  display:flex;flex-direction:column;
  overflow:hidden;
  /* when detached (windowed) */
  transition:border-radius .2s,box-shadow .2s;
}
.cv-panel.windowed{
  inset:auto;
  border-radius:12px;
  box-shadow:0 8px 40px rgba(0,0,0,.28),0 2px 8px rgba(0,0,0,.15);
  border:.5px solid rgba(255,255,255,.15);
  min-width:220px;min-height:160px;
}

/* Drag handle bar (only visible in windowed mode) */
.cv-titlebar{
  display:none;
  height:28px;flex-shrink:0;
  background:rgba(44,44,46,.96);
  align-items:center;justify-content:space-between;
  padding:0 10px;cursor:grab;user-select:none;
}
.cv-panel.windowed .cv-titlebar{display:flex;}
.cv-titlebar:active{cursor:grabbing;}
.cv-tb-title{font-size:12px;color:rgba(235,235,245,.5);letter-spacing:.02em;}
.cv-tb-btns{display:flex;gap:6px;}
.cv-tb-dot{width:12px;height:12px;border-radius:50%;cursor:pointer;transition:filter .12s;}
.cv-tb-dot:active{filter:brightness(.8);}

/* Guide lines on canvas background */
.cv-lines{
  position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 39px,rgba(0,122,255,.07) 40px);
}
.cv-panel canvas{
  display:block;width:100%;height:100%;
  touch-action:none;cursor:crosshair;
  position:relative;z-index:1;flex:1;
}

/* Resize handles (8 directions) */
.cv-panel.windowed .rh{display:block;}
.rh{
  display:none;position:absolute;z-index:10;
}
.rh-n {top:-4px;left:12px;right:12px;height:8px;cursor:n-resize;}
.rh-s {bottom:-4px;left:12px;right:12px;height:8px;cursor:s-resize;}
.rh-w {left:-4px;top:12px;bottom:12px;width:8px;cursor:w-resize;}
.rh-e {right:-4px;top:12px;bottom:12px;width:8px;cursor:e-resize;}
.rh-nw{top:-4px;left:-4px;width:16px;height:16px;cursor:nw-resize;}
.rh-ne{top:-4px;right:-4px;width:16px;height:16px;cursor:ne-resize;}
.rh-sw{bottom:-4px;left:-4px;width:16px;height:16px;cursor:sw-resize;}
.rh-se{bottom:-4px;right:-4px;width:16px;height:16px;cursor:se-resize;}

/* Fullscreen / windowed toggle btn */
.cv-mode-btn{
  position:absolute;top:10px;right:10px;z-index:5;
  width:30px;height:30px;border-radius:8px;
  border:none;background:rgba(44,44,46,.7);
  backdrop-filter:blur(8px);
  color:rgba(235,235,245,.8);font-size:15px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .12s;
}
.cv-mode-btn:active{background:rgba(44,44,46,.95);}

/* Footer */
.pp-foot{background:#2C2C2E;border-top:.5px solid rgba(255,255,255,.05);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.p-ghost{padding:9px 15px;border-radius:var(--r-md);border:.5px solid rgba(255,255,255,.12);background:transparent;color:rgba(235,235,245,.65);font-size:14px;transition:background .12s;}
.p-ghost:active{background:rgba(255,255,255,.08);}
.p-prime{margin-left:auto;padding:9px 20px;border-radius:var(--r-md);border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;letter-spacing:-.1px;transition:opacity .15s,transform .15s var(--spring);}
.p-prime:active{opacity:.82;transform:scale(.97);}

/* ── POPOVER ─────────────────────────────────── */
.pop{display:none;position:fixed;background:var(--surface);border-radius:var(--r-lg);border:.5px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.11);z-index:150;overflow:hidden;min-width:172px;transform-origin:top right;animation:popIn .18s var(--spring);}
@keyframes popIn{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
.pop.open{display:block;}
.pop-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:15px;color:var(--label);cursor:pointer;transition:background .1s;border:none;background:transparent;width:100%;text-align:left;}
.pop-item:active{background:var(--bg2);}
.pop-item+.pop-item{border-top:.5px solid var(--border2);}
.pop-item.danger{color:var(--red);}
.pop-ic{font-size:15px;width:20px;text-align:center;}

/* ── DIALOG ──────────────────────────────────── */
.dlg-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:400;align-items:center;justify-content:center;}
.dlg-ov.open{display:flex;}
.dlg{background:var(--surface);border-radius:var(--r-xl);width:270px;overflow:hidden;animation:popIn .2s var(--spring);text-align:center;}
.dlg-body{padding:20px 20px 0;}
.dlg-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.dlg-desc{font-size:13px;color:var(--label3);line-height:1.5;}
.dlg-acts{display:flex;border-top:.5px solid var(--border2);margin-top:20px;}
.dlg-btn{flex:1;padding:14px;font-size:17px;border:none;background:transparent;cursor:pointer;transition:background .1s;}
.dlg-btn:active{background:var(--bg2);}
.dlg-btn+.dlg-btn{border-left:.5px solid var(--border2);}
.dlg-btn.confirm{color:var(--red);font-weight:600;}
.dlg-btn.cancel{color:var(--accent);}

/* ── TOAST ───────────────────────────────────── */
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(28,28,30,.9);backdrop-filter:blur(16px);color:#fff;padding:11px 20px;border-radius:22px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .22s var(--out),transform .22s var(--spring);pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#importFI{display:none;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="tb-sb-btn" id="sbToggleBtn" onclick="toggleSB()" title="切换菜单">☰</button>
  <span style="font-size:20px">📖</span>
  <div class="topbar-title">错题本</div>
  <button class="tb-more" onclick="togglePop(event)" id="moreBtn">更多 ···</button>
  <button class="tb-add" onclick="openAdd()">＋ 添加</button>
</div>

<!-- POPOVER -->
<div class="pop" id="pop">
  <button class="pop-item" onclick="doExport()"><span class="pop-ic">📤</span>导出错题</button>
  <button class="pop-item" onclick="document.getElementById('importFI').click()"><span class="pop-ic">📥</span>导入错题</button>
  <button class="pop-item danger" onclick="askClear()"><span class="pop-ic">🗑</span>清空全部</button>
</div>
<input type="file" id="importFI" accept=".json" onchange="doImport(this)">

<!-- LAYOUT -->
<div class="layout">

  <!-- sidebar overlay (portrait) -->
  <div class="sb-overlay" id="sbOverlay" onclick="closeSB()"></div>
  <!-- swipe-to-open edge -->
  <div class="sb-edge" id="sbEdge"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-sect">
      <div class="sb-lbl">全部</div>
      <div class="sb-item on" data-s="全部" onclick="pickSub(this)">
        <span style="font-size:15px;width:18px;text-align:center">📚</span>全部
        <span class="sb-cnt" id="c-全部">0</span>
      </div>
    </div>
    <div class="sb-sect" style="padding-top:8px">
      <div class="sb-lbl">科目</div>
      <div class="sb-item" data-s="数学" onclick="pickSub(this)"><span class="sb-dot" style="background:#4F46E5"></span>数学<span class="sb-cnt" id="c-数学">0</span></div>
      <div class="sb-item" data-s="语文" onclick="pickSub(this)"><span class="sb-dot" style="background:#007AFF"></span>语文<span class="sb-cnt" id="c-语文">0</span></div>
      <div class="sb-item" data-s="英语" onclick="pickSub(this)"><span class="sb-dot" style="background:#34C759"></span>英语<span class="sb-cnt" id="c-英语">0</span></div>
      <div class="sb-item" data-s="物理" onclick="pickSub(this)"><span class="sb-dot" style="background:#FF9500"></span>物理<span class="sb-cnt" id="c-物理">0</span></div>
      <div class="sb-item" data-s="化学" onclick="pickSub(this)"><span class="sb-dot" style="background:#FF3B30"></span>化学<span class="sb-cnt" id="c-化学">0</span></div>
      <div class="sb-item" data-s="生物" onclick="pickSub(this)"><span class="sb-dot" style="background:#FF2D55"></span>生物<span class="sb-cnt" id="c-生物">0</span></div>
      <div class="sb-item" data-s="历史" onclick="pickSub(this)"><span class="sb-dot" style="background:#AF52DE"></span>历史<span class="sb-cnt" id="c-历史">0</span></div>
      <div class="sb-item" data-s="地理" onclick="pickSub(this)"><span class="sb-dot" style="background:#5AC8FA"></span>地理<span class="sb-cnt" id="c-地理">0</span></div>
      <div class="sb-item" data-s="其他" onclick="pickSub(this)"><span class="sb-dot" style="background:#8E8E93"></span>其他<span class="sb-cnt" id="c-其他">0</span></div>
    </div>
    <div class="sb-div"></div>
    <div class="sb-stats">
      <div class="sb-stat"><span>未掌握</span><span class="sb-sv" id="st-w" style="color:var(--red)">0</span></div>
      <div class="sb-stat"><span>复习中</span><span class="sb-sv" id="st-r" style="color:var(--orange)">0</span></div>
      <div class="sb-stat"><span>已掌握</span><span class="sb-sv" id="st-d" style="color:var(--green)">0</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="tabs">
      <div class="tab-i on" onclick="pickSt(this,'all')">全部</div>
      <div class="tab-i" onclick="pickSt(this,'wrong')">未掌握</div>
      <div class="tab-i" onclick="pickSt(this,'review')">复习中</div>
      <div class="tab-i" onclick="pickSt(this,'done')">已掌握</div>
    </div>
    <div class="toolbar">
      <div class="srch-box">
        <span style="color:var(--label4);font-size:14px">🔍</span>
        <input type="search" placeholder="搜索题目、知识点…" id="srch" oninput="render()">
      </div>
      <button class="sort-btn" onclick="toggleSort()"><span id="sortLbl">最新优先</span></button>
    </div>
    <div class="cards-wrap"><div class="cards-grid" id="grid"></div></div>
  </div>
</div>

<!-- ADD/EDIT SHEET -->
<div class="sheet-ov" id="addSheet" onclick="if(event.target===this)closeAdd()">
  <div class="sheet">
    <div class="sheet-grab"></div>
    <div class="sheet-hd">
      <div class="sheet-title" id="sheetTitle">新建错题</div>
      <button class="sheet-x" onclick="closeAdd()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="fg"><label class="fl">题目内容</label><textarea class="fi" id="fQ" rows="5" placeholder="在此录入题目…"></textarea></div>
      <div class="fg"><label class="fl">正确答案 / 解题思路</label><textarea class="fi" id="fA" rows="3" placeholder="正确做法或关键步骤（可选）…"></textarea></div>
      <div class="frow">
        <div class="fg"><label class="fl">科目</label>
          <select class="fi" id="fSub"><option>数学</option><option>语文</option><option>英语</option><option>物理</option><option>化学</option><option>生物</option><option>历史</option><option>地理</option><option>其他</option></select>
        </div>
        <div class="fg"><label class="fl">知识点 / 章节</label><input class="fi" id="fTag" type="text" placeholder="如：二次函数"></div>
      </div>
      <div class="fg"><label class="fl">出错原因</label><input class="fi" id="fReason" type="text" placeholder="粗心 / 公式记错 / 概念不清…"></div>
      <div class="fg">
        <label class="fl">掌握状态</label>
        <div class="st-picker">
          <div class="st-opt sw" data-v="wrong"  onclick="pickStOpt(this)">❌ 未掌握</div>
          <div class="st-opt"    data-v="review" onclick="pickStOpt(this)">🔄 复习中</div>
          <div class="st-opt"    data-v="done"   onclick="pickStOpt(this)">✅ 已掌握</div>
        </div>
      </div>
      <button class="save-btn" onclick="saveQ()">保存</button>
    </div>
  </div>
</div>

<!-- PENCIL PANEL -->
<div class="pp" id="pp">
  <!-- Nav -->
  <div class="pp-nav">
    <div class="pp-q" id="ppQ"></div>
    <button class="pb on" id="pbPen"   onclick="setTool('pen')"   title="钢笔">✏️</button>
    <button class="pb"    id="pbMark"  onclick="setTool('mark')"  title="荧光笔">🖌</button>
    <button class="pb"    id="pbErase" onclick="setTool('erase')" title="橡皮">⬜</button>
    <div class="pp-sep"></div>
    <button class="pb" onclick="undoLast()" title="撤销">↩</button>
    <button class="pb" onclick="closePP()"  title="关闭">✕</button>
  </div>
  <!-- Tools -->
  <div class="pp-tools">
    <div id="pal" style="display:flex;gap:7px;align-items:center">
      <div class="pc on"  style="background:#1C1C1E" onclick="pickColor('#1C1C1E',this)"></div>
      <div class="pc"     style="background:#007AFF" onclick="pickColor('#007AFF',this)"></div>
      <div class="pc"     style="background:#FF3B30" onclick="pickColor('#FF3B30',this)"></div>
      <div class="pc"     style="background:#34C759" onclick="pickColor('#34C759',this)"></div>
      <div class="pc"     style="background:#FF9500" onclick="pickColor('#FF9500',this)"></div>
      <div class="pc"     style="background:#AF52DE" onclick="pickColor('#AF52DE',this)"></div>
    </div>
    <div class="pp-sep2"></div>
    <span class="sz-lbl">粗细</span>
    <input type="range" class="sz-sl" min="1" max="20" value="3" id="szSl" oninput="penSz=+this.value;document.getElementById('szV').textContent=this.value">
    <span class="sz-val" id="szV">3</span>
  </div>
  <!-- Stage: contains the floating canvas panel -->
  <div class="pp-stage" id="ppStage">
    <div class="cv-panel" id="cvPanel">
      <!-- Mac-style title bar (windowed only) -->
      <div class="cv-titlebar" id="cvTitlebar">
        <div style="display:flex;gap:6px">
          <div class="cv-tb-dot" style="background:#FF5F57" onclick="closePP()" title="关闭"></div>
          <div class="cv-tb-dot" style="background:#FEBC2E" onclick="resetCvPanel()" title="还原"></div>
          <div class="cv-tb-dot" style="background:#28C840" onclick="maxCvPanel()" title="最大化"></div>
        </div>
        <div class="cv-tb-title">作答区域</div>
        <div style="width:54px"></div>
      </div>
      <!-- Guide lines -->
      <div class="cv-lines"></div>
      <!-- Resize handles -->
      <div class="rh rh-n"  data-dir="n"></div>
      <div class="rh rh-s"  data-dir="s"></div>
      <div class="rh rh-w"  data-dir="w"></div>
      <div class="rh rh-e"  data-dir="e"></div>
      <div class="rh rh-nw" data-dir="nw"></div>
      <div class="rh rh-ne" data-dir="ne"></div>
      <div class="rh rh-sw" data-dir="sw"></div>
      <div class="rh rh-se" data-dir="se"></div>
      <!-- Canvas -->
      <canvas id="cv"></canvas>
      <!-- Toggle button -->
      <button class="cv-mode-btn" id="cvModeBtn" onclick="toggleCvMode()" title="切换窗口/全屏">⊞</button>
    </div>
  </div>
  <!-- Footer -->
  <div class="pp-foot">
    <button class="p-ghost" onclick="clearCv()">清除画布</button>
    <button class="p-ghost" onclick="cycleFromPP()">切换状态</button>
    <button class="p-prime" onclick="saveAnswer()">保存作答 ✓</button>
  </div>
</div>

<!-- DIALOG -->
<div class="dlg-ov" id="dlgOv">
  <div class="dlg">
    <div class="dlg-body">
      <div class="dlg-title" id="dlgTitle">确认</div>
      <div class="dlg-desc"  id="dlgDesc"></div>
    </div>
    <div class="dlg-acts">
      <button class="dlg-btn cancel"  onclick="closeDlg()">取消</button>
      <button class="dlg-btn confirm" id="dlgOk">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════════
   DATA
════════════════════════════════════════════════ */
const KEY='cuoti_v3';
let qs=[];try{qs=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){}
let fSub='全部',fSt='all',sortDesc=true,editId=null,fmSt='wrong';
const SC={数学:'#4F46E5',语文:'#007AFF',英语:'#34C759',物理:'#FF9500',化学:'#FF3B30',生物:'#FF2D55',历史:'#AF52DE',地理:'#5AC8FA',其他:'#8E8E93'};
function persist(){localStorage.setItem(KEY,JSON.stringify(qs));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

/* ════════════════════════════════════════════════
   SIDEBAR — responsive open/close
════════════════════════════════════════════════ */
let sbOpen=false;

function isPortrait(){return window.innerHeight>window.innerWidth;}

function openSB(){
  if(!isPortrait())return;
  sbOpen=true;
  document.getElementById('sidebar').classList.add('open');
  const ov=document.getElementById('sbOverlay');
  ov.classList.add('vis');
  requestAnimationFrame(()=>ov.classList.add('dim'));
}
function closeSB(){
  sbOpen=false;
  document.getElementById('sidebar').classList.remove('open');
  const ov=document.getElementById('sbOverlay');
  ov.classList.remove('dim');
  setTimeout(()=>ov.classList.remove('vis'),280);
}
function toggleSB(){sbOpen?closeSB():openSB();}

// Auto-adjust on orientation change
window.addEventListener('resize',()=>{
  if(!isPortrait()){
    // landscape: force close overlay state (sidebar is always visible via CSS)
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sbOverlay').classList.remove('vis','dim');
    sbOpen=false;
  }
  // re-init canvas if pencil panel open
  if(document.getElementById('pp').classList.contains('open')){
    const snap=document.getElementById('cv').toDataURL();
    initCv();
    const img=new Image();img.onload=()=>getCtx().drawImage(img,0,0);img.src=snap;
  }
});

// Close sidebar when picking a subject (portrait UX)
function pickSub(el){
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('on'));
  el.classList.add('on');fSub=el.dataset.s;render();
  if(isPortrait())closeSB();
}

/* Swipe-to-open: edge zone */
(()=>{
  const edge=document.getElementById('sbEdge');
  let tx0=0,startedEdge=false;
  edge.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;startedEdge=true;},{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!startedEdge||sbOpen)return;
    const dx=e.touches[0].clientX-tx0;
    if(dx>40){openSB();startedEdge=false;}
  },{passive:true});
  document.addEventListener('touchend',()=>{startedEdge=false;},{passive:true});

  // Swipe-left to close when sidebar open
  let tx1=0;
  document.getElementById('sidebar').addEventListener('touchstart',e=>{tx1=e.touches[0].clientX;},{passive:true});
  document.getElementById('sidebar').addEventListener('touchmove',e=>{
    if(!sbOpen)return;
    if(tx1-e.touches[0].clientX>50)closeSB();
  },{passive:true});
})();

/* ════════════════════════════════════════════════
   RENDER
════════════════════════════════════════════════ */
function render(){
  updateSB_counts();
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const list=qs.filter(x=>{
    return(fSub==='全部'||x.subject===fSub)
      &&(fSt==='all'||x.status===fSt)
      &&(!q||x.q.toLowerCase().includes(q)||(x.tag||'').toLowerCase().includes(q));
  }).sort((a,b)=>sortDesc?b.at-a.at:a.at-b.at);

  const g=document.getElementById('grid');
  if(!list.length){
    g.innerHTML=`<div class="empty"><div class="empty-icon">${q?'🔍':'📝'}</div><div class="empty-title">${q?'没有匹配的错题':'还没有错题'}</div><div class="empty-desc">${q?'换个关键词试试':'点击「添加」录入第一道错题。'}</div>${!q?'<button class="empty-btn" onclick="openAdd()">＋ 添加错题</button>':''}</div>`;
    return;
  }
  const stC={wrong:{l:'未掌握',c:'st-wrong'},review:{l:'复习中',c:'st-review'},done:{l:'已掌握',c:'st-done'}};
  g.innerHTML=list.map((x,i)=>{
    const sc=SC[x.subject]||'#8E8E93',st=stC[x.status]||stC.wrong;
    const tags=[x.tag,x.reason].filter(Boolean);
    return `<div class="card" style="animation-delay:${Math.min(i*.03,.18)}s">
      <div class="card-head"><span class="sub-pill" style="background:${sc}18;color:${sc}">${x.subject}</span><span class="st-pill ${st.c}">${st.l}</span></div>
      <div class="card-body"><div class="card-q">${esc(x.q)}</div>${tags.length?`<div>${tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}</div>`:''}</div>
      <div class="card-foot"><span>${ago(x.at)}</span>${x.a?'<span class="card-dot"></span><span>有答案</span>':''}${x.ansImg?'<span class="card-ans-badge">✏️ 已作答</span>':''}</div>
      <div class="card-acts">
        <button class="c-btn p" onclick="openPP('${x.id}')">✏️ 作答</button>
        <button class="c-btn"   onclick="openEdit('${x.id}')">编辑</button>
        <button class="c-btn"   onclick="cycleSt('${x.id}')">换状态</button>
        <button class="c-btn d" onclick="askDel('${x.id}')">删除</button>
      </div>
    </div>`;
  }).join('');
}
function updateSB_counts(){
  ['全部','数学','语文','英语','物理','化学','生物','历史','地理','其他'].forEach(s=>{
    const e=document.getElementById('c-'+s);if(e)e.textContent=s==='全部'?qs.length:qs.filter(q=>q.subject===s).length;
  });
  document.getElementById('st-w').textContent=qs.filter(q=>q.status==='wrong').length;
  document.getElementById('st-r').textContent=qs.filter(q=>q.status==='review').length;
  document.getElementById('st-d').textContent=qs.filter(q=>q.status==='done').length;
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ago(ts){const d=Math.floor((Date.now()-ts)/86400000);if(d===0)return'今天';if(d===1)return'昨天';if(d<7)return d+'天前';if(d<30)return Math.floor(d/7)+'周前';return Math.floor(d/30)+'月前';}

/* ════════════════════════════════════════════════
   FILTER
════════════════════════════════════════════════ */
function pickSt(el,s){document.querySelectorAll('.tab-i').forEach(t=>t.classList.remove('on'));el.classList.add('on');fSt=s;render();}
function toggleSort(){sortDesc=!sortDesc;document.getElementById('sortLbl').textContent=sortDesc?'最新优先':'最旧优先';render();}

/* ════════════════════════════════════════════════
   ADD / EDIT
════════════════════════════════════════════════ */
function openAdd(){
  editId=null;fmSt='wrong';
  document.getElementById('sheetTitle').textContent='新建错题';
  ['fQ','fA','fTag','fReason'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fSub').selectedIndex=0;
  document.querySelectorAll('.st-opt').forEach(o=>{o.className='st-opt'+(o.dataset.v==='wrong'?' sw':'');});
  document.getElementById('addSheet').classList.add('open');
  setTimeout(()=>document.getElementById('fQ').focus(),360);
  closePop();
}
function openEdit(id){
  const x=qs.find(q=>q.id===id);if(!x)return;
  editId=id;fmSt=x.status;
  document.getElementById('sheetTitle').textContent='编辑错题';
  document.getElementById('fQ').value=x.q;document.getElementById('fA').value=x.a||'';
  document.getElementById('fTag').value=x.tag||'';document.getElementById('fReason').value=x.reason||'';
  document.getElementById('fSub').value=x.subject;
  const sm={wrong:'sw',review:'sr',done:'sd'};
  document.querySelectorAll('.st-opt').forEach(o=>{o.className='st-opt'+(o.dataset.v===x.status?' '+sm[x.status]:'');});
  document.getElementById('addSheet').classList.add('open');
}
function closeAdd(){document.getElementById('addSheet').classList.remove('open');}
function pickStOpt(el){
  fmSt=el.dataset.v;const sm={wrong:'sw',review:'sr',done:'sd'};
  document.querySelectorAll('.st-opt').forEach(o=>{o.className='st-opt'+(o===el?' '+sm[fmSt]:'');});
}
function saveQ(){
  const q=document.getElementById('fQ').value.trim();
  if(!q){toast('请填写题目内容');document.getElementById('fQ').focus();return;}
  if(editId){
    const x=qs.find(q=>q.id===editId);if(!x)return;
    x.q=q;x.a=document.getElementById('fA').value.trim();x.subject=document.getElementById('fSub').value;
    x.tag=document.getElementById('fTag').value.trim();x.reason=document.getElementById('fReason').value.trim();
    x.status=fmSt;x.edited=Date.now();toast('✓ 已保存');
  }else{
    qs.unshift({id:uid(),q,at:Date.now(),a:document.getElementById('fA').value.trim(),
      subject:document.getElementById('fSub').value,tag:document.getElementById('fTag').value.trim(),
      reason:document.getElementById('fReason').value.trim(),status:fmSt,ansImg:null});
    toast('✓ 错题已添加');
  }
  persist();closeAdd();render();
}

/* ════════════════════════════════════════════════
   STATUS / DELETE
════════════════════════════════════════════════ */
function cycleSt(id){
  const x=qs.find(q=>q.id===id);if(!x)return;
  const n={wrong:'review',review:'done',done:'wrong'},l={wrong:'→ 复习中',review:'→ 已掌握',done:'→ 未掌握'};
  toast(l[x.status]);x.status=n[x.status];persist();render();
}
function cycleFromPP(){if(ppId)cycleSt(ppId);}
let pendDel=null;
function askDel(id){
  pendDel=id;
  document.getElementById('dlgTitle').textContent='删除错题';
  document.getElementById('dlgDesc').textContent='这道错题和作答记录将被永久删除，无法恢复。';
  document.getElementById('dlgOk').textContent='删除';
  document.getElementById('dlgOk').onclick=()=>{qs=qs.filter(q=>q.id!==pendDel);persist();render();closeDlg();toast('已删除');};
  document.getElementById('dlgOv').classList.add('open');
}
function closeDlg(){document.getElementById('dlgOv').classList.remove('open');}

/* ════════════════════════════════════════════════
   EXPORT / IMPORT
════════════════════════════════════════════════ */
function doExport(){
  closePop();
  const b=new Blob([JSON.stringify(qs,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`错题本_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.json`;
  a.click();URL.revokeObjectURL(a.href);toast('✓ 已导出 '+qs.length+' 道');
}
function doImport(input){
  closePop();const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);if(!Array.isArray(data))throw 0;
      const ids=new Set(qs.map(q=>q.id));
      const nw=data.filter(x=>x.id&&x.q&&!ids.has(x.id));
      qs=[...nw,...qs];persist();render();toast(`✓ 导入 ${nw.length} 道（已去重）`);
    }catch{toast('⚠️ 文件格式不正确');}
  };
  r.readAsText(f);input.value='';
}
function askClear(){
  closePop();
  document.getElementById('dlgTitle').textContent='清空全部错题';
  document.getElementById('dlgDesc').textContent='所有错题和作答记录将被永久删除，无法恢复。';
  document.getElementById('dlgOk').textContent='清空';
  document.getElementById('dlgOk').onclick=()=>{qs=[];persist();render();closeDlg();toast('已清空');};
  document.getElementById('dlgOv').classList.add('open');
}

/* ════════════════════════════════════════════════
   POPOVER
════════════════════════════════════════════════ */
function togglePop(e){
  e.stopPropagation();
  const p=document.getElementById('pop'),b=document.getElementById('moreBtn'),r=b.getBoundingClientRect();
  p.style.top=(r.bottom+8)+'px';p.style.right=(window.innerWidth-r.right)+'px';
  p.classList.toggle('open');
}
function closePop(){document.getElementById('pop').classList.remove('open');}
document.addEventListener('click',e=>{if(!document.getElementById('pop').contains(e.target))closePop();});

/* ════════════════════════════════════════════════
   CANVAS PANEL — windowed / fullscreen + drag + resize
════════════════════════════════════════════════ */
let cvWindowed=false;
// stored windowed geometry
let cvRect={x:40,y:40,w:0,h:0};

function toggleCvMode(){
  cvWindowed=!cvWindowed;
  applyCvMode();
}
function applyCvMode(){
  const panel=document.getElementById('cvPanel');
  const btn=document.getElementById('cvModeBtn');
  if(cvWindowed){
    panel.classList.add('windowed');
    btn.textContent='⛶';btn.title='全屏';
    const stage=document.getElementById('ppStage');
    const sw=stage.clientWidth,sh=stage.clientHeight;
    // default windowed size: 70% × 75%
    if(!cvRect.w){cvRect.w=Math.round(sw*.7);cvRect.h=Math.round(sh*.75);}
    cvRect.x=Math.max(0,Math.min(cvRect.x,sw-cvRect.w));
    cvRect.y=Math.max(0,Math.min(cvRect.y,sh-cvRect.h));
    applyPanelRect();
  }else{
    panel.classList.remove('windowed');
    panel.style.cssText='';
    btn.textContent='⊞';btn.title='窗口模式';
  }
  snapCanvas();
}
function applyPanelRect(){
  const p=document.getElementById('cvPanel');
  p.style.left=cvRect.x+'px';p.style.top=cvRect.y+'px';
  p.style.width=cvRect.w+'px';p.style.height=cvRect.h+'px';
  p.style.right='auto';p.style.bottom='auto';
}
function maxCvPanel(){cvWindowed=false;applyCvMode();}
function resetCvPanel(){
  const stage=document.getElementById('ppStage');
  cvRect={x:40,y:40,w:Math.round(stage.clientWidth*.7),h:Math.round(stage.clientHeight*.75)};
  applyPanelRect();snapCanvas();
}

/* — DRAG (titlebar) — */
(()=>{
  let drag=false,ox=0,oy=0,px0=0,py0=0;
  const tb=document.getElementById('cvTitlebar');
  function dStart(e){
    if(!cvWindowed)return;
    drag=true;
    const src=e.touches?e.touches[0]:e;
    ox=src.clientX;oy=src.clientY;px0=cvRect.x;py0=cvRect.y;
    e.preventDefault();
  }
  function dMove(e){
    if(!drag)return;
    const src=e.touches?e.touches[0]:e;
    const dx=src.clientX-ox,dy=src.clientY-oy;
    const stage=document.getElementById('ppStage');
    cvRect.x=Math.max(0,Math.min(px0+dx,stage.clientWidth-cvRect.w));
    cvRect.y=Math.max(0,Math.min(py0+dy,stage.clientHeight-cvRect.h));
    applyPanelRect();e.preventDefault();
  }
  function dEnd(){drag=false;snapCanvas();}
  tb.addEventListener('mousedown',dStart);
  tb.addEventListener('touchstart',dStart,{passive:false});
  document.addEventListener('mousemove',dMove);
  document.addEventListener('mouseup',dEnd);
  document.addEventListener('touchmove',e=>{if(drag)dMove(e);},{passive:false});
  document.addEventListener('touchend',dEnd);
})();

/* — RESIZE (handles) — */
(()=>{
  let rsz=false,dir='',ox=0,oy=0,r0={};
  document.querySelectorAll('.rh').forEach(h=>{
    h.addEventListener('mousedown',e=>{startRsz(e,h.dataset.dir);});
    h.addEventListener('touchstart',e=>{startRsz(e,h.dataset.dir);},{passive:false});
  });
  function startRsz(e,d){
    if(!cvWindowed)return;
    rsz=true;dir=d;
    const src=e.touches?e.touches[0]:e;
    ox=src.clientX;oy=src.clientY;
    r0={...cvRect};e.preventDefault();e.stopPropagation();
  }
  function doRsz(e){
    if(!rsz)return;e.preventDefault();
    const src=e.touches?e.touches[0]:e;
    const dx=src.clientX-ox,dy=src.clientY-oy;
    const stage=document.getElementById('ppStage');
    const sw=stage.clientWidth,sh=stage.clientHeight;
    const MIN=180,MINH=120;
    let {x,y,w,h}=r0;
    if(dir.includes('e'))w=Math.max(MIN,Math.min(r0.w+dx,sw-r0.x));
    if(dir.includes('s'))h=Math.max(MINH,Math.min(r0.h+dy,sh-r0.y));
    if(dir.includes('w')){const nw=Math.max(MIN,r0.w-dx);x=r0.x+(r0.w-nw);w=nw;}
    if(dir.includes('n')){const nh=Math.max(MINH,r0.h-dy);y=r0.y+(r0.h-nh);h=nh;}
    cvRect={x,y,w,h};applyPanelRect();
  }
  function endRsz(){if(rsz){rsz=false;snapCanvas();}}
  document.addEventListener('mousemove',doRsz);
  document.addEventListener('mouseup',endRsz);
  document.addEventListener('touchmove',e=>{if(rsz)doRsz(e);},{passive:false});
  document.addEventListener('touchend',endRsz);
})();

/* ════════════════════════════════════════════════
   PENCIL / CANVAS
════════════════════════════════════════════════ */
let drawing=false,strokes=[],curStroke=null,lpx=0,lpy=0;
let penColor='#1C1C1E',penSz=3,penTool='pen',ppId=null;

function openPP(id){
  ppId=id;const x=qs.find(q=>q.id===id);if(!x)return;
  document.getElementById('ppQ').textContent=x.q;
  document.getElementById('pp').classList.add('open');
  strokes=[];setTool('pen');cvRect.w=0;// reset size so it recalculates
  requestAnimationFrame(()=>{
    initCv();
    if(x.ansImg){const img=new Image();img.onload=()=>getCtx().drawImage(img,0,0);img.src=x.ansImg;}
  });
}
function closePP(){document.getElementById('pp').classList.remove('open');ppId=null;}

function getCtx(){return document.getElementById('cv').getContext('2d');}

function initCv(){
  const panel=document.getElementById('cvPanel');
  const c=document.getElementById('cv');
  const dpr=window.devicePixelRatio||1;
  // canvas fills the panel (minus titlebar if windowed)
  const tb=document.getElementById('cvTitlebar');
  const tbH=cvWindowed?tb.offsetHeight:0;
  const W=panel.clientWidth,H=panel.clientHeight-tbH;
  c.width=W*dpr;c.height=H*dpr;
  c.style.width=W+'px';c.style.height=H+'px';
  const ctx=getCtx();ctx.scale(dpr,dpr);
  ctx.lineCap='round';ctx.lineJoin='round';
}
function snapCanvas(){
  const snap=document.getElementById('cv').toDataURL();
  initCv();
  const img=new Image();img.onload=()=>getCtx().drawImage(img,0,0);img.src=snap;
}

function pt(e){
  const r=document.getElementById('cv').getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return{x:s.clientX-r.left,y:s.clientY-r.top};
}
function onDn(e){if(e.touches&&e.touches.length>1)return;e.preventDefault();drawing=true;const p=pt(e);lpx=p.x;lpy=p.y;curStroke={c:penColor,s:penSz,t:penTool,pts:[{x:lpx,y:lpy}]};}
function onMv(e){
  if(!drawing)return;if(e.touches&&e.touches.length>1){endDraw();return;}e.preventDefault();
  const p=pt(e),ctx=getCtx();
  if(penTool==='erase'){const er=penSz*6+4;ctx.clearRect(p.x-er/2,p.y-er/2,er,er);}
  else{
    ctx.globalAlpha=penTool==='mark'?.25:1;ctx.strokeStyle=penColor;
    ctx.lineWidth=penTool==='mark'?penSz*3.5:penSz;
    ctx.beginPath();ctx.moveTo(lpx,lpy);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.globalAlpha=1;
    if(curStroke)curStroke.pts.push({x:p.x,y:p.y});
  }
  lpx=p.x;lpy=p.y;
}
function endDraw(){if(!drawing)return;drawing=false;if(curStroke&&curStroke.pts.length>1)strokes.push(curStroke);curStroke=null;}

const cv=document.getElementById('cv');
cv.addEventListener('mousedown',onDn);cv.addEventListener('mousemove',onMv);
cv.addEventListener('mouseup',endDraw);cv.addEventListener('mouseleave',endDraw);
cv.addEventListener('touchstart',onDn,{passive:false});cv.addEventListener('touchmove',onMv,{passive:false});
cv.addEventListener('touchend',endDraw);

function redrawAll(){
  const c=document.getElementById('cv'),dpr=window.devicePixelRatio||1;
  const ctx=getCtx();ctx.clearRect(0,0,c.width/dpr,c.height/dpr);
  strokes.forEach(s=>{
    if(s.pts.length<2)return;
    ctx.globalAlpha=s.t==='mark'?.25:1;ctx.strokeStyle=s.c;
    ctx.lineWidth=s.t==='mark'?s.s*3.5:s.s;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(s.pts[0].x,s.pts[0].y);
    s.pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();
  });ctx.globalAlpha=1;
}
function undoLast(){strokes.pop();redrawAll();}
function clearCv(){
  strokes=[];const c=document.getElementById('cv'),dpr=window.devicePixelRatio||1;
  getCtx().clearRect(0,0,c.width/dpr,c.height/dpr);
}
function setTool(t){
  penTool=t;['pbPen','pbMark','pbErase'].forEach(id=>document.getElementById(id).classList.remove('on'));
  const m={pen:'pbPen',mark:'pbMark',erase:'pbErase'};if(m[t])document.getElementById(m[t]).classList.add('on');
  cv.style.cursor=t==='erase'?'cell':'crosshair';
}
function pickColor(c,el){
  penColor=c;document.querySelectorAll('.pc').forEach(d=>d.classList.remove('on'));
  el.classList.add('on');if(penTool==='erase')setTool('pen');
}
function saveAnswer(){
  if(!ppId)return;const x=qs.find(q=>q.id===ppId);if(!x)return;
  x.ansImg=document.getElementById('cv').toDataURL('image/jpeg',.85);
  if(x.status==='wrong')x.status='review';
  persist();render();toast('✓ 作答已保存');closePP();
}

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
let toastT;
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),2300);}

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
render();
</script>
