<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>错题本</title>
<style>
  :root {
    --bg: #F6F6F4;
    --card: #FFFFFF;
    --surface: rgba(255,255,255,0.78);
    --surface-strong: rgba(255,255,255,0.94);
    --border: #DAD9D6;
    --text: #1C1C1E;
    --text2: #636366;
    --text3: #A1A1A6;
    --accent: #007AFF;
    --accent-light: #E8F2FF;
    --yellow: #FFD60A;
    --radius: 18px;
    --sidebar: 246px;
    --shadow: 0 16px 44px rgba(0,0,0,0.08);
    --spring: cubic-bezier(.2,.8,.2,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; font-size: 15px; letter-spacing: 0; }

  /* TOP BAR */
  .topbar { background: var(--surface-strong); backdrop-filter: saturate(1.5) blur(24px); -webkit-backdrop-filter: saturate(1.5) blur(24px); border-bottom: 0.5px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; z-index: 10; }
  .app-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(160deg,#FFE06B,#FFB800); display: grid; place-items: center; box-shadow: inset 0 -1px 0 rgba(0,0,0,.08); }
  .topbar-title { font-size: 22px; font-weight: 700; flex: 1; letter-spacing: 0; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; min-height: 36px; padding: 8px 14px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; border: none; transition: transform .18s var(--spring), background .18s var(--spring), box-shadow .18s var(--spring), opacity .18s var(--spring); white-space: nowrap; font-family: inherit; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 8px 18px rgba(0,122,255,.22); }
  .btn-ghost { background: rgba(118,118,128,.11); color: var(--accent); }
  .btn-ghost:active { background: rgba(118,118,128,.18); }
  .btn-danger { background: #FFE8E8; color: #C62828; border: none; }
  .btn-icon { width: 36px; padding: 0; font-size: 19px; border-radius: 10px; }

  /* LAYOUT */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar); background: rgba(246,246,244,.86); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; padding: 10px 10px 18px; }
  .sidebar-section { padding: 8px 0 6px; }
  .sidebar-label { font-size: 12px; font-weight: 600; color: var(--text3); padding: 0 10px; margin-bottom: 7px; }
  .subject-item { display: flex; align-items: center; gap: 10px; min-height: 38px; padding: 8px 10px; border-radius: 10px; cursor: pointer; font-size: 15px; color: var(--text); margin-bottom: 2px; transition: background .18s var(--spring), transform .18s var(--spring); user-select: none; }
  .subject-item:active { transform: scale(.985); background: rgba(118,118,128,.14); }
  .subject-item.active { background: rgba(0,122,255,.13); color: var(--accent); font-weight: 600; }
  .subject-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,.12); }
  .subject-count { margin-left: auto; font-size: 13px; color: var(--text3); font-variant-numeric: tabular-nums; }
  .subject-item.active .subject-count { color: var(--accent); }
  .stats-box { margin: 8px 0 14px; background: var(--surface); border: 0.5px solid rgba(0,0,0,.06); border-radius: 14px; padding: 13px 12px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--text2); padding: 4px 0; }
  .stat-val { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .tabs { display: flex; align-items: center; gap: 6px; border-bottom: 0.5px solid var(--border); background: var(--surface-strong); padding: 10px 18px; flex-shrink: 0; }
  .tab { padding: 8px 14px; min-height: 34px; border-radius: 9px; font-size: 15px; color: var(--text2); cursor: pointer; transition: background .18s var(--spring), color .18s var(--spring), transform .18s var(--spring); white-space: nowrap; }
  .tab:active { transform: scale(.97); }
  .tab.active { color: var(--text); background: rgba(118,118,128,.13); font-weight: 600; }

  /* CARDS */
  .cards { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; align-content: start; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
  .card { background: var(--card); border-radius: var(--radius); border: 0.5px solid rgba(0,0,0,.08); overflow: hidden; cursor: default; transition: transform .2s var(--spring), box-shadow .2s var(--spring), border-color .2s var(--spring); box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .card:active { transform: scale(0.99); }
  .card-thumb { min-height: 74px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; position: relative; border-bottom: 0.5px solid rgba(0,0,0,.06); overflow: hidden; padding: 12px; }
  .card-thumb-icon { width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; background: rgba(255,255,255,.72); font-size: 21px; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,.06); }
  .card-badge { font-size: 12px; font-weight: 600; padding: 5px 9px; border-radius: 999px; }
  .badge-wrong { background: #FEE2E2; color: #991B1B; }
  .badge-review { background: #FEF3C7; color: #92400E; }
  .badge-done { background: #D1FAE5; color: #065F46; }
  .card-has-answer { font-size: 12px; background: rgba(0,122,255,0.12); color: var(--accent); padding: 5px 9px; border-radius: 999px; font-weight: 600; }
  .card-body { padding: 13px 14px 10px; }
  .card-q { font-size: 15px; line-height: 1.55; color: var(--text); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; }
  .card-answer { color: var(--text2); font-size: 13px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: -2px 0 10px; }
  .card-meta { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; color: var(--text3); margin-bottom: 10px; }
  .card-actions { display: grid; grid-template-columns: 1fr 1fr 38px; gap: 8px; padding: 0 12px 12px; }
  .card-btn { min-height: 34px; display: grid; place-items: center; padding: 7px 6px; border-radius: 10px; font-size: 13px; cursor: pointer; border: none; background: rgba(118,118,128,.10); color: var(--text2); transition: transform .16s var(--spring), background .16s var(--spring); user-select: none; }
  .card-btn:active { transform: scale(.96); background: rgba(118,118,128,.18); }
  .card-btn.accent { background: var(--accent-light); color: var(--accent); font-weight: 600; }

  /* EMPTY */
  .empty { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text3); padding: 60px 40px; text-align: center; }
  .empty-icon { font-size: 48px; }
  .empty-title { font-size: 16px; font-weight: 500; color: var(--text2); }
  .empty-desc { font-size: 14px; line-height: 1.6; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.28); z-index: 100; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity .24s var(--spring); }
  .modal-bg.open { display: flex; opacity: 1; }
  .modal { background: var(--surface-strong); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-radius: 22px 22px 0 0; width: 100%; max-width: 700px; max-height: 93dvh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 -18px 50px rgba(0,0,0,.16); animation: sheetIn .28s var(--spring); }
  @keyframes sheetIn { from { transform: translateY(24px); opacity: .88; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 40px; height: 5px; background: rgba(60,60,67,.26); border-radius: 999px; margin: 10px auto 0; flex-shrink: 0; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 12px; flex-shrink: 0; border-bottom: 0.5px solid var(--border); }
  .modal-title { font-size: 20px; font-weight: 700; }
  .modal-close { width: 32px; height: 32px; border-radius: 50%; background: rgba(118,118,128,.12); color: var(--text2); cursor: pointer; display: grid; place-items: center; line-height: 1; transition: background .18s var(--spring), transform .18s var(--spring); }
  .modal-close:active { transform: scale(.94); background: rgba(118,118,128,.2); }
  .modal-body { padding: 18px 20px 26px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 7px; display: block; }
  .form-input { width: 100%; padding: 12px 13px; border-radius: 12px; border: 0.5px solid rgba(0,0,0,.08); background: #fff; font-size: 16px; line-height: 1.45; color: var(--text); font-family: inherit; resize: vertical; -webkit-appearance: none; box-shadow: inset 0 1px 0 rgba(0,0,0,.02); transition: border-color .18s var(--spring), box-shadow .18s var(--spring), background .18s var(--spring); }
  .form-input:focus { outline: none; border-color: rgba(0,122,255,.45); box-shadow: 0 0 0 4px rgba(0,122,255,.12); background: #fff; }
  select.form-input { cursor: pointer; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .hint-strip { background: rgba(255,214,10,.18); border: 0.5px solid rgba(255,149,0,.18); color: #7A4B00; border-radius: 12px; padding: 11px 12px; font-size: 14px; line-height: 1.45; margin-bottom: 16px; }

  /* PENCIL PANEL */
  .pencil-panel { display: none; position: fixed; inset: 0; background: #F7F7F2; z-index: 200; flex-direction: column; }
  .pencil-panel.open { display: flex; }
  .pencil-topbar { display: flex; align-items: center; gap: 9px; padding: 12px 16px; background: var(--surface-strong); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .pencil-q-text { flex: 1; font-size: 14px; color: var(--text2); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .p-tool { width: 40px; height: 40px; border-radius: 11px; background: rgba(118,118,128,.12); border: none; color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 17px; flex-shrink: 0; transition: transform .16s var(--spring), background .16s var(--spring), color .16s var(--spring); }
  .p-tool.on { background: var(--accent); color: #fff; }
  .p-tool:active { transform: scale(.94); }
  .canvas-wrap { flex: 1; position: relative; background: #FFFDF6; overflow: hidden; background-image: linear-gradient(rgba(0,122,255,.08) 1px, transparent 1px); background-size: 100% 32px; }
  .canvas-wrap canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; cursor: crosshair; display: block; }
  .pencil-footer { background: var(--surface-strong); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); padding: 12px 16px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; border-top: 0.5px solid var(--border); }
  .color-row { display: flex; gap: 8px; align-items: center; }
  .cdot { width: 27px; height: 27px; border-radius: 50%; cursor: pointer; border: 2.5px solid #fff; transition: transform .16s var(--spring), box-shadow .16s var(--spring); flex-shrink: 0; box-shadow: 0 0 0 0.5px rgba(0,0,0,.18); }
  .cdot.on { transform: scale(1.12); box-shadow: 0 0 0 3px rgba(0,122,255,.22), 0 0 0 0.5px rgba(0,0,0,.18); }
  .size-row { display: flex; align-items: center; gap: 6px; }
  .size-row span { font-size: 13px; color: var(--text2); }
  .size-row input[type=range] { width: 92px; accent-color: var(--accent); }
  .p-right { margin-left: auto; display: flex; gap: 8px; }

  /* TOAST */
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: rgba(28,28,30,0.9); backdrop-filter: blur(10px); color: #fff; padding: 10px 20px; border-radius: 18px; font-size: 14px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  @media (max-width: 760px) {
    body { overflow: auto; }
    .layout { flex-direction: column; overflow: hidden; }
    .sidebar { width: 100%; max-height: 174px; border-right: 0; border-bottom: 0.5px solid var(--border); }
    .sidebar-section { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 4px; }
    .sidebar-label { grid-column: 1/-1; }
    .stats-box { display: none; }
    .cards { grid-template-columns: 1fr; padding: 14px; }
    .topbar { padding: 10px 12px; }
    .topbar-title { font-size: 18px; }
    .btn { font-size: 14px; padding: 7px 10px; }
    .form-row { grid-template-columns: 1fr; gap: 0; }
    .pencil-footer { flex-wrap: wrap; }
    .p-right { width: 100%; margin-left: 0; }
    .p-right .btn { flex: 1; }
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="app-icon">✎</span>
  <div class="topbar-title">错题本</div>
  <button class="btn btn-ghost" onclick="document.getElementById('importIn').click()">导入</button>
  <button class="btn btn-ghost" onclick="exportData()">导出</button>
  <button class="btn btn-primary" onclick="openAdd()">＋ 新建</button>
  <input type="file" id="importIn" accept="application/json,.json" style="display:none" onchange="importData(this)">
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">科目</div>
      <div class="subject-item active" data-s="全部" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#8B8B93"></span>全部
        <span class="subject-count" id="c-全部">0</span>
      </div>
      <div class="subject-item" data-s="数学" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#4F46E5"></span>数学
        <span class="subject-count" id="c-数学">0</span>
      </div>
      <div class="subject-item" data-s="语文" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#0EA5E9"></span>语文
        <span class="subject-count" id="c-语文">0</span>
      </div>
      <div class="subject-item" data-s="英语" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#10B981"></span>英语
        <span class="subject-count" id="c-英语">0</span>
      </div>
      <div class="subject-item" data-s="物理" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#F59E0B"></span>物理
        <span class="subject-count" id="c-物理">0</span>
      </div>
      <div class="subject-item" data-s="化学" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#EF4444"></span>化学
        <span class="subject-count" id="c-化学">0</span>
      </div>
      <div class="subject-item" data-s="生物" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#EC4899"></span>生物
        <span class="subject-count" id="c-生物">0</span>
      </div>
      <div class="subject-item" data-s="其他" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#A78BFA"></span>其他
        <span class="subject-count" id="c-其他">0</span>
      </div>
    </div>
    <div class="stats-box">
      <div class="sidebar-label" style="padding:0;margin-bottom:8px">本月统计</div>
      <div class="stat-row">未掌握 <span class="stat-val" id="st-wrong" style="color:#EF4444">0</span></div>
      <div class="stat-row">复习中 <span class="stat-val" id="st-review" style="color:#F59E0B">0</span></div>
      <div class="stat-row">已掌握 <span class="stat-val" id="st-done" style="color:#10B981">0</span></div>
      <div class="stat-row" style="margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border)">合计 <span class="stat-val" id="st-total">0</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="tabs">
      <div class="tab active" onclick="pickStatus(this,'all')">全部</div>
      <div class="tab" onclick="pickStatus(this,'wrong')">未掌握</div>
      <div class="tab" onclick="pickStatus(this,'review')">复习中</div>
      <div class="tab" onclick="pickStatus(this,'done')">已掌握</div>
    </div>
    <div class="cards" id="grid"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="addModalTitle">添加错题</div>
      <div class="modal-close" onclick="closeAdd()">×</div>
    </div>
    <div class="modal-body">
      <div class="hint-strip">像在备忘录里记一条笔记一样录入错题：题目、答案、知识点和出错原因都可以之后再补。</div>

      <!-- Question -->
      <div class="form-group">
        <label class="form-label">题目内容 <span style="color:#EF4444">*</span></label>
        <textarea class="form-input" id="fQ" rows="5" placeholder="手动输入或粘贴题目内容"></textarea>
      </div>

      <!-- Answer -->
      <div class="form-group">
        <label class="form-label">正确答案 / 解题思路</label>
        <textarea class="form-input" id="fA" rows="3" placeholder="记下正确做法、关键公式或思路…"></textarea>
      </div>

      <!-- Subject + Tag -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">科目</label>
          <select class="form-input" id="fSub">
            <option>数学</option><option>语文</option><option>英语</option>
            <option>物理</option><option>化学</option><option>生物</option><option>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">知识点 / 章节</label>
          <input class="form-input" id="fTag" placeholder="如：二次函数">
        </div>
      </div>

      <!-- Reason -->
      <div class="form-group">
        <label class="form-label">出错原因</label>
        <input class="form-input" id="fReason" placeholder="粗心 / 公式记错 / 概念不清…">
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;font-size:16px;padding:13px;border-radius:12px" onclick="saveQ()">保存错题</button>
    </div>
  </div>
</div>

<!-- PENCIL PANEL -->
<div class="pencil-panel" id="pencilPanel">
  <div class="pencil-topbar">
    <div class="pencil-q-text" id="pQText"></div>
    <button class="p-tool on" id="tPen"    onclick="setTool('pen')"    title="钢笔">✏️</button>
    <button class="p-tool"    id="tMark"   onclick="setTool('mark')"   title="荧光笔">🖊</button>
    <button class="p-tool"    id="tErase"  onclick="setTool('erase')"  title="橡皮">⬜</button>
    <button class="p-tool"                 onclick="undoLast()"         title="撤销">↩</button>
    <button class="p-tool"                 onclick="closePencil()"      title="关闭">✕</button>
  </div>
  <div class="canvas-wrap">
    <canvas id="cv"></canvas>
  </div>
  <div class="pencil-footer">
    <div class="color-row">
      <div class="cdot on"  style="background:#1C1C1E" onclick="pickColor('#1C1C1E',this)"></div>
      <div class="cdot"     style="background:#4F46E5" onclick="pickColor('#4F46E5',this)"></div>
      <div class="cdot"     style="background:#EF4444" onclick="pickColor('#EF4444',this)"></div>
      <div class="cdot"     style="background:#10B981" onclick="pickColor('#10B981',this)"></div>
      <div class="cdot"     style="background:#F59E0B" onclick="pickColor('#F59E0B',this)"></div>
    </div>
    <div class="size-row">
      <span>粗细</span>
      <input type="range" min="1" max="18" value="3" id="szSlider" oninput="sz=+this.value">
    </div>
    <div class="p-right">
      <button class="btn btn-ghost" style="font-size:13px;padding:7px 12px" onclick="clearCv()">清除</button>
      <button class="btn btn-primary" style="font-size:13px;padding:7px 14px" onclick="saveAnswer()">保存作答 ✓</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const KEY = 'cuoti_v2';
let qs = [];
try { qs = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { qs = []; }

let curSubject = '全部';
let curStatus  = 'all';
let curId      = null;

const subColors = {数学:'#4F46E5',语文:'#0EA5E9',英语:'#10B981',物理:'#F59E0B',化学:'#EF4444',生物:'#EC4899',其他:'#A78BFA'};
const statusCfg = {
  wrong:  { label:'未掌握', cls:'badge-wrong' },
  review: { label:'复习中', cls:'badge-review' },
  done:   { label:'已掌握', cls:'badge-done' }
};

function persist() { localStorage.setItem(KEY, JSON.stringify(qs)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  updateSidebar();
  const list = qs.filter(q => {
    const s = curSubject === '全部' || q.subject === curSubject;
    const t = curStatus  === 'all'  || q.status  === curStatus;
    return s && t;
  }).sort((a,b) => b.at - a.at);

  const grid = document.getElementById('grid');

  if (!list.length) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">📝</div>
      <div class="empty-title">暂无错题</div>
      <div class="empty-desc">点击右上角「新建」<br>手动输入或粘贴题目即可</div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(q => {
    const sc = subColors[q.subject] || '#8B8B93';
    const st = statusCfg[q.status] || statusCfg.wrong;
    const answer = q.a ? `<div class="card-answer">${esc(q.a)}</div>` : '';
    return `<div class="card">
      <div class="card-thumb" style="background:${sc}15">
        <span class="card-thumb-icon" style="color:${sc}">✎</span>
        <span class="card-badge ${st.cls}">${st.label}</span>
        ${q.ansImg ? '<span class="card-has-answer">已作答</span>' : ''}
      </div>
      <div class="card-body">
        <div class="card-q">${esc(q.q)}</div>
        ${answer}
        <div class="card-meta">
          <span style="color:${sc};font-weight:500">${esc(q.subject)}${q.tag?' · '+esc(q.tag):''}</span>
          <span>${ago(q.at)}</span>
        </div>
      </div>
      <div class="card-actions">
        <div class="card-btn accent" onclick="openPencil('${q.id}')">✏️ 作答</div>
        <div class="card-btn" onclick="cycleStatus('${q.id}')">换状态</div>
        <div class="card-btn" onclick="delQ('${q.id}')">🗑</div>
      </div>
    </div>`;
  }).join('');
}

function updateSidebar() {
  const subs = ['全部','数学','语文','英语','物理','化学','生物','其他'];
  subs.forEach(s => {
    const el = document.getElementById('c-'+s);
    if (el) el.textContent = s === '全部' ? qs.length : qs.filter(q=>q.subject===s).length;
  });
  document.getElementById('st-wrong').textContent  = qs.filter(q=>q.status==='wrong').length;
  document.getElementById('st-review').textContent = qs.filter(q=>q.status==='review').length;
  document.getElementById('st-done').textContent   = qs.filter(q=>q.status==='done').length;
  document.getElementById('st-total').textContent  = qs.length;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function ago(ts) {
  const d = Math.floor((Date.now()-ts)/86400000);
  if (d===0) return '今天'; if (d===1) return '昨天';
  if (d<7)   return d+'天前'; if (d<30) return Math.floor(d/7)+'周前';
  return Math.floor(d/30)+'月前';
}

// ══════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════
function pickSubject(el) {
  document.querySelectorAll('.subject-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  curSubject = el.dataset.s;
  render();
}
function pickStatus(el, s) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  curStatus = s;
  render();
}

// ══════════════════════════════════════════
// ADD / SAVE
// ══════════════════════════════════════════
function openAdd() {
  ['fQ','fA','fTag','fReason'].forEach(id => document.getElementById(id).value='');
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('fQ').focus(), 180);
}
function closeAdd() { document.getElementById('addModal').classList.remove('open'); }

function saveQ() {
  const q = document.getElementById('fQ').value.trim();
  if (!q) { showToast('请先填写题目内容'); return; }
  qs.unshift({
    id: uid(),
    q,
    a:       document.getElementById('fA').value.trim(),
    subject: document.getElementById('fSub').value,
    tag:     document.getElementById('fTag').value.trim(),
    reason:  document.getElementById('fReason').value.trim(),
    status:  'wrong',
    ansImg:  null,
    at:      Date.now()
  });
  persist();
  closeAdd();
  render();
  showToast('✓ 错题已添加');
}

function delQ(id) {
  if (!confirm('确定删除这道错题？')) return;
  qs = qs.filter(q=>q.id!==id);
  persist(); render(); showToast('已删除');
}

function cycleStatus(id) {
  const q = qs.find(x=>x.id===id); if (!q) return;
  const nxt = {wrong:'review',review:'done',done:'wrong'};
  const lbl = {wrong:'→ 复习中',review:'→ 已掌握',done:'→ 未掌握'};
  showToast(lbl[q.status]);
  q.status = nxt[q.status];
  persist(); render();
}

// ══════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════
function exportData() {
  const data = JSON.stringify(qs, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '错题本_' + new Date().toLocaleDateString('zh-CN').replace(/\//g,'-') + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('✓ 数据已导出为 JSON 文件');
}

function importData(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('not-array');
      const cleaned = data.map(item => ({
        id: /^[a-zA-Z0-9_-]+$/.test(String(item.id || '')) ? String(item.id) : uid(),
        q: String(item.q || '').trim(),
        a: String(item.a || '').trim(),
        subject: subColors[item.subject] ? item.subject : '其他',
        tag: String(item.tag || '').trim(),
        reason: String(item.reason || '').trim(),
        status: statusCfg[item.status] ? item.status : 'wrong',
        ansImg: item.ansImg || null,
        at: Number(item.at) || Date.now()
      })).filter(item => item.q);
      if (!cleaned.length) throw new Error('empty');
      const incoming = confirm('导入后会替换当前错题本，是否继续？\n\n确定：替换当前数据\n取消：不导入');
      if (!incoming) return;
      qs = cleaned;
      persist();
      render();
      showToast('✓ 已导入 ' + qs.length + ' 道错题');
    } catch(e) {
      showToast('导入失败，请选择有效的错题本 JSON');
    } finally {
      input.value = '';
    }
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════
// CANVAS / APPLE PENCIL
// ══════════════════════════════════════════
let drawing = false, strokes = [], curStroke = null, baseAnswerImg = null;
let inkColor = '#1C1C1E', sz = 3, tool = 'pen';
let px = 0, py = 0;

function openPencil(id) {
  curId = id;
  const q = qs.find(x=>x.id===id); if (!q) return;
  document.getElementById('pQText').textContent = q.q;
  document.getElementById('pencilPanel').classList.add('open');
  strokes = [];
  baseAnswerImg = null;
  setTool('pen');
  requestAnimationFrame(() => {
    initCv();
    if (q.ansImg) {
      const img = new Image();
      img.onload = () => {
        baseAnswerImg = img;
        redrawAll();
      };
      img.src = q.ansImg;
    }
  });
}

function closePencil() {
  document.getElementById('pencilPanel').classList.remove('open');
  curId = null;
  baseAnswerImg = null;
}

function initCv() {
  const wrap = document.querySelector('.canvas-wrap');
  const c = document.getElementById('cv');
  const dpr = window.devicePixelRatio || 1;
  const W = wrap.clientWidth, H = wrap.clientHeight;
  c.width  = W * dpr;
  c.height = H * dpr;
  c.style.width  = W + 'px';
  c.style.height = H + 'px';
  const ctx = c.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function pt(e) {
  const r = document.getElementById('cv').getBoundingClientRect();
  const pressure = e.pressure && e.pressure > 0 ? e.pressure : 0.5;
  return { x: e.clientX - r.left, y: e.clientY - r.top, p: pressure };
}

function strokeWidth(stroke, point) {
  if (stroke.t === 'erase') return stroke.s * 7;
  const base = stroke.t === 'mark' ? stroke.s * 3.5 : stroke.s;
  return Math.max(1, base * (0.72 + point.p * 0.56));
}

function drawSegment(ctx, stroke, from, to) {
  ctx.save();
  ctx.globalCompositeOperation = stroke.t === 'erase' ? 'destination-out' : 'source-over';
  ctx.globalAlpha = stroke.t === 'mark' ? 0.28 : 1;
  ctx.strokeStyle = stroke.c;
  ctx.lineWidth = strokeWidth(stroke, to);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const mx = (from.x + to.x) / 2;
  const my = (from.y + to.y) / 2;
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.quadraticCurveTo(from.x, from.y, mx, my);
  ctx.stroke();
  ctx.restore();
}

function onDown(e) {
  e.preventDefault();
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  e.currentTarget.setPointerCapture?.(e.pointerId);
  drawing = true;
  const p = pt(e); px = p.x; py = p.y;
  curStroke = { c: inkColor, s: sz, t: tool, pts: [p] };
  const ctx = document.getElementById('cv').getContext('2d');
  drawSegment(ctx, curStroke, p, {...p, x:p.x + 0.01});
}

function onMove(e) {
  if (!drawing) return;
  e.preventDefault();
  const ctx = document.getElementById('cv').getContext('2d');
  const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  events.forEach(ev => {
    const p = pt(ev);
    const last = curStroke.pts[curStroke.pts.length - 1];
    drawSegment(ctx, curStroke, last, p);
    curStroke.pts.push(p);
    px = p.x; py = p.y;
  });
}

function onUp(e) {
  if (!drawing) return;
  e?.currentTarget?.releasePointerCapture?.(e.pointerId);
  drawing = false;
  if (curStroke && curStroke.pts.length) strokes.push(curStroke);
  curStroke = null;
}

const cvEl = document.getElementById('cv');
cvEl.addEventListener('pointerdown', onDown);
cvEl.addEventListener('pointermove', onMove);
cvEl.addEventListener('pointerup', onUp);
cvEl.addEventListener('pointercancel', onUp);

function redrawAll() {
  const c = document.getElementById('cv');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, c.width/dpr, c.height/dpr);
  if (baseAnswerImg) ctx.drawImage(baseAnswerImg, 0, 0, c.width/dpr, c.height/dpr);
  strokes.forEach(s => {
    if (!s.pts.length) return;
    if (s.pts.length === 1) {
      drawSegment(ctx, s, s.pts[0], {...s.pts[0], x:s.pts[0].x + 0.01});
      return;
    }
    for (let i = 1; i < s.pts.length; i++) drawSegment(ctx, s, s.pts[i-1], s.pts[i]);
  });
}

function undoLast() { strokes.pop(); redrawAll(); }
function clearCv()  { strokes = []; baseAnswerImg = null; const c=document.getElementById('cv'); const dpr=window.devicePixelRatio||1; c.getContext('2d').clearRect(0,0,c.width/dpr,c.height/dpr); }

function setTool(t) {
  tool = t;
  ['tPen','tMark','tErase'].forEach(id => document.getElementById(id).classList.remove('on'));
  const m = {pen:'tPen', mark:'tMark', erase:'tErase'};
  if (m[t]) document.getElementById(m[t]).classList.add('on');
  document.getElementById('cv').style.cursor = t === 'erase' ? 'cell' : 'crosshair';
}

function pickColor(c, el) {
  inkColor = c;
  document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('on'));
  el.classList.add('on');
  if (tool === 'erase') setTool('pen');
}

function saveAnswer() {
  if (!curId) return;
  const q = qs.find(x=>x.id===curId); if (!q) return;
  const c = document.getElementById('cv');
  q.ansImg = c.toDataURL('image/jpeg', 0.82);
  if (q.status === 'wrong') q.status = 'review';
  persist(); render();
  showToast('✓ 作答已保存');
  closePencil();
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
render();

// Resize canvas when orientation changes
window.addEventListener('resize', () => {
  if (document.getElementById('pencilPanel').classList.contains('open')) {
    const saved = document.getElementById('cv').toDataURL();
    initCv();
    const img = new Image();
    img.onload = () => document.getElementById('cv').getContext('2d').drawImage(img, 0, 0);
    img.src = saved;
  }
});
</script>
</body>
