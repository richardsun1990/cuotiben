<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>错题本</title>
<style>
:root {
  --bg:         #F2F1F6;
  --bg2:        #E8E7ED;
  --surface:    #FFFFFF;
  --surface2:   #F7F7F8;
  --border:     rgba(60,60,67,0.12);
  --border2:    rgba(60,60,67,0.07);
  --label:      #1C1C1E;
  --label2:     #3C3C43;
  --label3:     rgba(60,60,67,0.60);
  --label4:     rgba(60,60,67,0.36);
  --accent:     #4F46E5;
  --accent-bg:  rgba(79,70,229,0.09);
  --accent-mid: rgba(79,70,229,0.20);
  --red:        #FF3B30; --red-bg:    rgba(255,59,48,0.10);
  --orange:     #FF9500; --orange-bg: rgba(255,149,0,0.10);
  --green:      #34C759; --green-bg:  rgba(52,199,89,0.10);
  --r-sm:8px; --r-md:13px; --r-lg:18px; --r-xl:22px;
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --out:    cubic-bezier(0.25,0.46,0.45,0.94);
  --sidebar-w: 228px;
  --font: -apple-system,"SF Pro Text","PingFang SC",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--label);display:flex;flex-direction:column;}
input,textarea,select,button{font-family:inherit;}
textarea{resize:none;}
button{cursor:pointer;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* TOPBAR */
.topbar{height:52px;background:rgba(242,241,246,0.88);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:20;}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;flex:1;}
.tb-menu-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--label2);font-size:14px;transition:background 0.12s;}
.tb-menu-btn:active{background:var(--bg2);}
.tb-add-btn{display:flex;align-items:center;gap:5px;padding:7px 16px;border-radius:20px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:500;letter-spacing:-0.1px;transition:opacity 0.15s,transform 0.15s var(--spring);}
.tb-add-btn:active{opacity:0.82;transform:scale(0.97);}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sb-sect{padding:18px 12px 4px;}
.sb-label{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--label4);padding:0 6px;margin-bottom:4px;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-md);cursor:pointer;font-size:15px;color:var(--label);letter-spacing:-0.1px;margin-bottom:1px;transition:background 0.12s var(--out);user-select:none;}
.sb-item:active{background:var(--bg2)!important;}
.sb-item.on{background:var(--accent-bg);color:var(--accent);font-weight:500;}
.sb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sb-cnt{margin-left:auto;font-size:13px;color:var(--label4);min-width:16px;text-align:right;}
.sb-item.on .sb-cnt{color:var(--accent);opacity:.7;}
.sb-div{height:0.5px;background:var(--border);margin:8px 12px;}
.sb-stats{margin:6px 12px 16px;background:var(--surface2);border-radius:var(--r-md);padding:12px 14px;}
.sb-stat{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px;color:var(--label3);}
.sb-stat+.sb-stat{border-top:0.5px solid var(--border2);margin-top:3px;padding-top:6px;}
.sb-stat-v{font-weight:600;font-size:14px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface);padding:0 18px;flex-shrink:0;}
.tab-i{padding:12px 14px;font-size:14px;letter-spacing:-0.1px;color:var(--label3);border-bottom:2px solid transparent;margin-bottom:-0.5px;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap;user-select:none;}
.tab-i.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border-bottom:0.5px solid var(--border2);flex-shrink:0;}
.search-box{flex:1;display:flex;align-items:center;gap:7px;background:var(--bg);border-radius:var(--r-sm);padding:7px 11px;}
.search-box input{flex:1;border:none;background:transparent;font-size:15px;color:var(--label);outline:none;}
.search-box input::placeholder{color:var(--label4);}
.srch-ic{color:var(--label4);font-size:14px;}
.sort-btn{padding:7px 12px;border-radius:var(--r-sm);border:0.5px solid var(--border);background:var(--surface);font-size:13px;color:var(--label2);white-space:nowrap;transition:background .12s;}
.sort-btn:active{background:var(--bg2);}

/* CARDS */
.cards-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px;}

/* CARD */
.card{background:var(--surface);border-radius:var(--r-lg);border:0.5px solid var(--border2);overflow:hidden;cursor:default;transition:transform .18s var(--spring),box-shadow .18s var(--out);will-change:transform;animation:cardIn .28s var(--spring) both;}
@keyframes cardIn{from{opacity:0;transform:scale(.94) translateY(6px);}to{opacity:1;transform:scale(1) translateY(0);}}
.card:active{transform:scale(.975);box-shadow:0 2px 8px rgba(0,0,0,.07);}
.card-head{padding:13px 14px 9px;display:flex;align-items:center;gap:8px;}
.sub-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em;flex-shrink:0;}
.st-pill{margin-left:auto;display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;flex-shrink:0;}
.st-wrong{background:var(--red-bg);color:var(--red);}
.st-review{background:var(--orange-bg);color:var(--orange);}
.st-done{background:var(--green-bg);color:var(--green);}
.card-body{padding:0 14px 10px;}
.card-q{font-size:14px;line-height:1.55;color:var(--label);letter-spacing:-.1px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;}
.card-tag{display:inline-block;font-size:11px;color:var(--label3);background:var(--surface2);padding:2px 8px;border-radius:6px;margin:0 4px 4px 0;}
.card-foot{display:flex;align-items:center;gap:6px;padding:8px 14px 10px;border-top:0.5px solid var(--border2);font-size:12px;color:var(--label4);}
.card-dot{width:3px;height:3px;border-radius:50%;background:var(--label4);}
.card-ans-badge{margin-left:auto;font-size:11px;color:var(--accent);font-weight:500;}
.card-acts{display:flex;border-top:0.5px solid var(--border2);}
.c-btn{flex:1;padding:10px 4px;text-align:center;font-size:13px;color:var(--label3);border:none;background:transparent;transition:background .12s,color .12s;letter-spacing:-.1px;}
.c-btn+.c-btn{border-left:0.5px solid var(--border2);}
.c-btn:active{background:var(--bg2);}
.c-btn.p{color:var(--accent);font-weight:500;}
.c-btn.d{color:var(--red);}

/* EMPTY */
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:80px 40px;text-align:center;animation:fadeIn .3s var(--out);}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.empty-icon{font-size:52px;margin-bottom:4px;}
.empty-title{font-size:18px;font-weight:600;color:var(--label2);letter-spacing:-.3px;}
.empty-desc{font-size:14px;color:var(--label3);line-height:1.6;max-width:240px;}
.empty-btn{margin-top:8px;padding:10px 22px;border-radius:22px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:500;transition:opacity .15s,transform .15s var(--spring);}
.empty-btn:active{opacity:.8;transform:scale(.97);}

/* SHEET */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;transition:background .3s var(--out);align-items:flex-end;justify-content:center;}
.sheet-overlay.open{display:flex;background:rgba(0,0,0,.32);}
.sheet{background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:660px;max-height:93dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .38s var(--spring);overflow:hidden;}
.sheet-overlay.open .sheet{transform:translateY(0);}
.sheet-grab{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;flex-shrink:0;border-bottom:0.5px solid var(--border2);}
.sheet-title{font-size:18px;font-weight:700;letter-spacing:-.4px;}
.sheet-close{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:none;color:var(--label3);font-size:16px;font-weight:500;display:flex;align-items:center;justify-content:center;transition:background .12s;}
.sheet-close:active{background:var(--border);}
.sheet-body{padding:16px 20px 32px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}

/* FORM */
.fg{margin-bottom:18px;}
.fl{display:block;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--label3);margin-bottom:7px;}
.fi{width:100%;padding:12px 14px;border-radius:var(--r-md);border:0.5px solid var(--border);background:var(--bg);font-size:16px;color:var(--label);outline:none;transition:border-color .15s,background .15s,box-shadow .15s;-webkit-appearance:none;}
.fi:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-bg);}
.fi::placeholder{color:var(--label4);}
textarea.fi{line-height:1.55;}
select.fi{cursor:pointer;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.st-picker{display:flex;gap:8px;}
.st-opt{flex:1;padding:10px 6px;text-align:center;border-radius:var(--r-md);border:1.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s var(--out);background:var(--surface);color:var(--label3);}
.st-opt.sw{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.st-opt.sr{background:var(--orange-bg);border-color:var(--orange);color:var(--orange);}
.st-opt.sd{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.save-btn{width:100%;padding:14px;border-radius:var(--r-md);border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:600;letter-spacing:-.2px;transition:opacity .15s,transform .15s var(--spring);margin-top:4px;}
.save-btn:active{opacity:.83;transform:scale(.98);}

/* PENCIL PANEL */
.pp{display:none;position:fixed;inset:0;background:#1C1C1E;z-index:300;flex-direction:column;}
.pp.open{display:flex;animation:ppIn .28s var(--spring);}
@keyframes ppIn{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:scale(1);}}
.pp-nav{display:flex;align-items:center;gap:8px;padding:11px 14px;background:rgba(28,28,30,.96);backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(255,255,255,.07);flex-shrink:0;}
.pp-q{flex:1;font-size:13px;color:rgba(235,235,245,.65);line-height:1.4;letter-spacing:-.1px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pb{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,.08);color:rgba(235,235,245,.9);font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s,transform .1s var(--spring);}
.pb:active{background:rgba(255,255,255,.18);transform:scale(.91);}
.pb.on{background:var(--accent);color:#fff;}
.pp-sep{width:0.5px;height:20px;background:rgba(255,255,255,.1);flex-shrink:0;margin:0 2px;}
.pp-tools{background:#2C2C2E;border-bottom:0.5px solid rgba(255,255,255,.05);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.pp-sep2{width:0.5px;height:22px;background:rgba(255,255,255,.1);margin:0 2px;}
.pc{width:26px;height:26px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;flex-shrink:0;transition:border-color .12s,transform .15s var(--spring);}
.pc:active{transform:scale(.86);}
.pc.on{border-color:#fff;transform:scale(1.1);}
.sz-lbl{font-size:11px;color:rgba(235,235,245,.38);white-space:nowrap;}
.sz-sl{width:70px;accent-color:var(--accent);}
.sz-val{font-size:12px;color:rgba(235,235,245,.38);min-width:18px;}

/* Canvas */
.cv-wrap{flex:1;position:relative;overflow:hidden;background:#FAFAF8;}
.cv-wrap::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 39px,rgba(0,122,255,.07) 40px);pointer-events:none;z-index:0;}
.cv-wrap canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block;cursor:crosshair;z-index:1;}

.pp-foot{background:#2C2C2E;border-top:0.5px solid rgba(255,255,255,.05);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.p-ghost{padding:9px 15px;border-radius:var(--r-md);border:0.5px solid rgba(255,255,255,.12);background:transparent;color:rgba(235,235,245,.65);font-size:14px;transition:background .12s;}
.p-ghost:active{background:rgba(255,255,255,.08);}
.p-prime{margin-left:auto;padding:9px 20px;border-radius:var(--r-md);border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;letter-spacing:-.1px;transition:opacity .15s,transform .15s var(--spring);}
.p-prime:active{opacity:.82;transform:scale(.97);}

/* POPOVER */
.pop{display:none;position:fixed;background:var(--surface);border-radius:var(--r-lg);border:0.5px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.11),0 2px 8px rgba(0,0,0,.05);z-index:150;overflow:hidden;min-width:176px;transform-origin:top right;animation:popIn .18s var(--spring);}
@keyframes popIn{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
.pop.open{display:block;}
.pop-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:15px;color:var(--label);cursor:pointer;transition:background .1s;border:none;background:transparent;width:100%;text-align:left;}
.pop-item:active{background:var(--bg2);}
.pop-item+.pop-item{border-top:0.5px solid var(--border2);}
.pop-item.danger{color:var(--red);}
.pop-ic{font-size:15px;width:20px;text-align:center;}

/* DIALOG */
.dlg-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:400;align-items:center;justify-content:center;}
.dlg-ov.open{display:flex;}
.dlg{background:var(--surface);border-radius:var(--r-xl);width:270px;overflow:hidden;animation:popIn .2s var(--spring);text-align:center;}
.dlg-body{padding:20px 20px 0;}
.dlg-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.dlg-desc{font-size:13px;color:var(--label3);line-height:1.5;}
.dlg-acts{display:flex;border-top:0.5px solid var(--border2);margin-top:20px;}
.dlg-btn{flex:1;padding:14px;font-size:17px;border:none;background:transparent;cursor:pointer;transition:background .1s;}
.dlg-btn:active{background:var(--bg2);}
.dlg-btn+.dlg-btn{border-left:0.5px solid var(--border2);}
.dlg-btn.confirm{color:var(--red);font-weight:600;}
.dlg-btn.cancel{color:var(--accent);}

/* TOAST */
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(28,28,30,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:#fff;padding:11px 20px;border-radius:22px;font-size:14px;font-weight:500;letter-spacing:-.1px;z-index:999;opacity:0;transition:opacity .22s var(--out),transform .22s var(--spring);pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

#importFileIn{display:none;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span style="font-size:20px">📖</span>
  <div class="topbar-title">错题本</div>
  <button class="tb-menu-btn" onclick="togglePop(event)" id="menuBtn">更多 ···</button>
  <button class="tb-add-btn" onclick="openAdd()">＋ 添加</button>
</div>

<!-- POPOVER -->
<div class="pop" id="pop">
  <button class="pop-item" onclick="doExport()"><span class="pop-ic">📤</span>导出错题</button>
  <button class="pop-item" onclick="document.getElementById('importFileIn').click()"><span class="pop-ic">📥</span>导入错题</button>
  <button class="pop-item danger" onclick="askClear()"><span class="pop-ic">🗑</span>清空全部</button>
</div>
<input type="file" id="importFileIn" accept=".json" onchange="doImport(this)">

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-sect">
      <div class="sb-label">全部</div>
      <div class="sb-item on" data-s="全部" onclick="pickSub(this)">
        <span style="font-size:15px;width:18px;text-align:center">📚</span>全部
        <span class="sb-cnt" id="c-全部">0</span>
      </div>
    </div>
    <div class="sb-sect" style="padding-top:8px">
      <div class="sb-label">科目</div>
      <div class="sb-item" data-s="数学" onclick="pickSub(this)"><span class="sb-dot" style="background:#4F46E5"></span>数学<span class="sb-cnt" id="c-数学">0</span></div>
      <div class="sb-item" data-s="语文" onclick="pickSub(this)"><span class="sb-dot" style="background:#007AFF"></span>语文<span class="sb-cnt" id="c-语文">0</span></div>
      <div class="sb-item" data-s="英语" onclick="pickSub(this)"><span class="sb-dot" style="background:#34C759"></span>英语<span class="sb-cnt" id="c-英语">0</span></div>
      <div class="sb-item" data-s="物理" onclick="pickSub(this)"><span class="sb-dot" style="background:#FF9500"></span>物理<span class="sb-cnt" id="c-物理">0</span></div>
      <div class="sb-item" data-s="化学" onclick="pickSub(this)"><span class="sb-dot" style="background:#FF3B30"></span>化学<span class="sb-cnt" id="c-化学">0</span></div>
      <div class="sb-item" data-s="生物" onclick="pickSub(this)"><span class="sb-dot" style="background:#FF2D55"></span>生物<span class="sb-cnt" id="c-生物">0</span></div>
      <div class="sb-item" data-s="历史" onclick="pickSub(this)"><span class="sb-dot" style="background:#AF52DE"></span>历史<span class="sb-cnt" id="c-历史">0</span></div>
      <div class="sb-item" data-s="地理" onclick="pickSub(this)"><span class="sb-dot" style="background:#5AC8FA"></span>地理<span class="sb-cnt" id="c-地理">0</span></div>
      <div class="sb-item" data-s="其他" onclick="pickSub(this)"><span class="sb-dot" style="background:#8E8E93"></span>其他<span class="sb-cnt" id="c-其他">0</span></div>
    </div>
    <div class="sb-div"></div>
    <div class="sb-stats">
      <div class="sb-stat"><span>未掌握</span><span class="sb-stat-v" id="st-w" style="color:var(--red)">0</span></div>
      <div class="sb-stat"><span>复习中</span><span class="sb-stat-v" id="st-r" style="color:var(--orange)">0</span></div>
      <div class="sb-stat"><span>已掌握</span><span class="sb-stat-v" id="st-d" style="color:var(--green)">0</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="tabs">
      <div class="tab-i on" onclick="pickSt(this,'all')">全部</div>
      <div class="tab-i" onclick="pickSt(this,'wrong')">未掌握</div>
      <div class="tab-i" onclick="pickSt(this,'review')">复习中</div>
      <div class="tab-i" onclick="pickSt(this,'done')">已掌握</div>
    </div>
    <div class="toolbar">
      <div class="search-box">
        <span class="srch-ic">🔍</span>
        <input type="search" placeholder="搜索题目、知识点…" id="srch" oninput="render()">
      </div>
      <button class="sort-btn" onclick="toggleSort()"><span id="sortLbl">最新优先</span></button>
    </div>
    <div class="cards-wrap"><div class="cards-grid" id="grid"></div></div>
  </div>
</div>

<!-- ADD / EDIT SHEET -->
<div class="sheet-overlay" id="addSheet" onclick="if(event.target===this)closeAdd()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-grab"></div>
    <div class="sheet-hd">
      <div class="sheet-title" id="sheetTitle">新建错题</div>
      <button class="sheet-close" onclick="closeAdd()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="fg">
        <label class="fl">题目内容</label>
        <textarea class="fi" id="fQ" rows="5" placeholder="在此录入题目…"></textarea>
      </div>
      <div class="fg">
        <label class="fl">正确答案 / 解题思路</label>
        <textarea class="fi" id="fA" rows="3" placeholder="正确做法或关键步骤（可选）…"></textarea>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="fl">科目</label>
          <select class="fi" id="fSub">
            <option>数学</option><option>语文</option><option>英语</option>
            <option>物理</option><option>化学</option><option>生物</option>
            <option>历史</option><option>地理</option><option>其他</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">知识点 / 章节</label>
          <input class="fi" id="fTag" type="text" placeholder="如：二次函数">
        </div>
      </div>
      <div class="fg">
        <label class="fl">出错原因</label>
        <input class="fi" id="fReason" type="text" placeholder="粗心 / 公式记错 / 概念不清…">
      </div>
      <div class="fg">
        <label class="fl">掌握状态</label>
        <div class="st-picker">
          <div class="st-opt sw" data-v="wrong"  onclick="pickStOpt(this)">❌ 未掌握</div>
          <div class="st-opt"    data-v="review" onclick="pickStOpt(this)">🔄 复习中</div>
          <div class="st-opt"    data-v="done"   onclick="pickStOpt(this)">✅ 已掌握</div>
        </div>
      </div>
      <button class="save-btn" onclick="saveQ()">保存</button>
    </div>
  </div>
</div>

<!-- PENCIL PANEL -->
<div class="pp" id="pp">
  <div class="pp-nav">
    <div class="pp-q" id="ppQ"></div>
    <button class="pb on" id="pbPen"   onclick="setTool('pen')"   title="钢笔">✏️</button>
    <button class="pb"    id="pbMark"  onclick="setTool('mark')"  title="荧光笔">🖌</button>
    <button class="pb"    id="pbErase" onclick="setTool('erase')" title="橡皮">⬜</button>
    <div class="pp-sep"></div>
    <button class="pb" onclick="undoLast()" title="撤销">↩</button>
    <button class="pb" onclick="closePP()" title="关闭">✕</button>
  </div>
  <div class="pp-tools">
    <div id="pal" style="display:flex;gap:7px;align-items:center">
      <div class="pc on"  style="background:#1C1C1E" onclick="pickColor('#1C1C1E',this)"></div>
      <div class="pc"     style="background:#007AFF" onclick="pickColor('#007AFF',this)"></div>
      <div class="pc"     style="background:#FF3B30" onclick="pickColor('#FF3B30',this)"></div>
      <div class="pc"     style="background:#34C759" onclick="pickColor('#34C759',this)"></div>
      <div class="pc"     style="background:#FF9500" onclick="pickColor('#FF9500',this)"></div>
      <div class="pc"     style="background:#AF52DE" onclick="pickColor('#AF52DE',this)"></div>
    </div>
    <div class="pp-sep2"></div>
    <span class="sz-lbl">粗细</span>
    <input type="range" class="sz-sl" min="1" max="20" value="3" id="szSl" oninput="penSz=+this.value;document.getElementById('szV').textContent=this.value">
    <span class="sz-val" id="szV">3</span>
  </div>
  <div class="cv-wrap"><canvas id="cv"></canvas></div>
  <div class="pp-foot">
    <button class="p-ghost" onclick="clearCv()">清除画布</button>
    <button class="p-ghost" onclick="cycleFromPP()">切换状态</button>
    <button class="p-prime" onclick="saveAnswer()">保存作答 ✓</button>
  </div>
</div>

<!-- DIALOG -->
<div class="dlg-ov" id="dlgOv">
  <div class="dlg">
    <div class="dlg-body">
      <div class="dlg-title" id="dlgTitle">确认</div>
      <div class="dlg-desc" id="dlgDesc"></div>
    </div>
    <div class="dlg-acts">
      <button class="dlg-btn cancel" onclick="closeDlg()">取消</button>
      <button class="dlg-btn confirm" id="dlgOk">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ─────────────────────────────────────────────────
const KEY='cuoti_v3';
let qs=[];
try{qs=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){}
let fSub='全部',fSt='all',sortDesc=true,editId=null,fmSt='wrong';
const SC={数学:'#4F46E5',语文:'#007AFF',英语:'#34C759',物理:'#FF9500',化学:'#FF3B30',生物:'#FF2D55',历史:'#AF52DE',地理:'#5AC8FA',其他:'#8E8E93'};
function persist(){localStorage.setItem(KEY,JSON.stringify(qs));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

// ── RENDER ───────────────────────────────────────────────
function render(){
  updateSB();
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const list=qs.filter(x=>{
    return (fSub==='全部'||x.subject===fSub)
      &&(fSt==='all'||x.status===fSt)
      &&(!q||x.q.toLowerCase().includes(q)||(x.tag||'').toLowerCase().includes(q));
  }).sort((a,b)=>sortDesc?b.at-a.at:a.at-b.at);

  const g=document.getElementById('grid');
  if(!list.length){
    g.innerHTML=`<div class="empty"><div class="empty-icon">${q?'🔍':'📝'}</div><div class="empty-title">${q?'没有匹配的错题':'还没有错题'}</div><div class="empty-desc">${q?'换个关键词试试':'点击「添加」录入第一道错题。'}</div>${!q?'<button class="empty-btn" onclick="openAdd()">＋ 添加错题</button>':''}</div>`;
    return;
  }
  const stC={wrong:{l:'未掌握',c:'st-wrong'},review:{l:'复习中',c:'st-review'},done:{l:'已掌握',c:'st-done'}};
  g.innerHTML=list.map((x,i)=>{
    const sc=SC[x.subject]||'#8E8E93';
    const st=stC[x.status]||stC.wrong;
    const tags=[x.tag,x.reason].filter(Boolean);
    return `<div class="card" style="animation-delay:${Math.min(i*.03,.18)}s">
      <div class="card-head">
        <span class="sub-pill" style="background:${sc}18;color:${sc}">${x.subject}</span>
        <span class="st-pill ${st.c}">${st.l}</span>
      </div>
      <div class="card-body">
        <div class="card-q">${esc(x.q)}</div>
        ${tags.length?`<div>${tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}</div>`:''}
      </div>
      <div class="card-foot">
        <span>${ago(x.at)}</span>
        ${x.a?'<span class="card-dot"></span><span>有答案</span>':''}
        ${x.ansImg?'<span class="card-ans-badge">✏️ 已作答</span>':''}
      </div>
      <div class="card-acts">
        <button class="c-btn p" onclick="openPP('${x.id}')">✏️ 作答</button>
        <button class="c-btn" onclick="openEdit('${x.id}')">编辑</button>
        <button class="c-btn" onclick="cycleSt('${x.id}')">换状态</button>
        <button class="c-btn d" onclick="askDel('${x.id}')">删除</button>
      </div>
    </div>`;
  }).join('');
}
function updateSB(){
  const subs=['全部','数学','语文','英语','物理','化学','生物','历史','地理','其他'];
  subs.forEach(s=>{const e=document.getElementById('c-'+s);if(e)e.textContent=s==='全部'?qs.length:qs.filter(q=>q.subject===s).length;});
  document.getElementById('st-w').textContent=qs.filter(q=>q.status==='wrong').length;
  document.getElementById('st-r').textContent=qs.filter(q=>q.status==='review').length;
  document.getElementById('st-d').textContent=qs.filter(q=>q.status==='done').length;
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ago(ts){const d=Math.floor((Date.now()-ts)/86400000);if(d===0)return'今天';if(d===1)return'昨天';if(d<7)return d+'天前';if(d<30)return Math.floor(d/7)+'周前';return Math.floor(d/30)+'月前';}

// ── FILTER ───────────────────────────────────────────────
function pickSub(el){document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('on'));el.classList.add('on');fSub=el.dataset.s;render();}
function pickSt(el,s){document.querySelectorAll('.tab-i').forEach(t=>t.classList.remove('on'));el.classList.add('on');fSt=s;render();}
function toggleSort(){sortDesc=!sortDesc;document.getElementById('sortLbl').textContent=sortDesc?'最新优先':'最旧优先';render();}

// ── ADD / EDIT ────────────────────────────────────────────
function openAdd(){
  editId=null;fmSt='wrong';
  document.getElementById('sheetTitle').textContent='新建错题';
  ['fQ','fA','fTag','fReason'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fSub').selectedIndex=0;
  document.querySelectorAll('.st-opt').forEach(o=>{o.className='st-opt'+(o.dataset.v==='wrong'?' sw':'');});
  document.getElementById('addSheet').classList.add('open');
  setTimeout(()=>document.getElementById('fQ').focus(),360);
  closePop();
}
function openEdit(id){
  const x=qs.find(q=>q.id===id);if(!x)return;
  editId=id;fmSt=x.status;
  document.getElementById('sheetTitle').textContent='编辑错题';
  document.getElementById('fQ').value=x.q;
  document.getElementById('fA').value=x.a||'';
  document.getElementById('fTag').value=x.tag||'';
  document.getElementById('fReason').value=x.reason||'';
  document.getElementById('fSub').value=x.subject;
  const sm={wrong:'sw',review:'sr',done:'sd'};
  document.querySelectorAll('.st-opt').forEach(o=>{o.className='st-opt'+(o.dataset.v===x.status?' '+sm[x.status]:'');});
  document.getElementById('addSheet').classList.add('open');
}
function closeAdd(){document.getElementById('addSheet').classList.remove('open');}
function pickStOpt(el){
  fmSt=el.dataset.v;
  const sm={wrong:'sw',review:'sr',done:'sd'};
  document.querySelectorAll('.st-opt').forEach(o=>{o.className='st-opt'+(o===el?' '+sm[fmSt]:'');});
}
function saveQ(){
  const q=document.getElementById('fQ').value.trim();
  if(!q){toast('请填写题目内容');document.getElementById('fQ').focus();return;}
  if(editId){
    const x=qs.find(q=>q.id===editId);if(!x)return;
    x.q=q;x.a=document.getElementById('fA').value.trim();
    x.subject=document.getElementById('fSub').value;
    x.tag=document.getElementById('fTag').value.trim();
    x.reason=document.getElementById('fReason').value.trim();
    x.status=fmSt;x.edited=Date.now();
    toast('✓ 已保存');
  }else{
    qs.unshift({id:uid(),q,at:Date.now(),a:document.getElementById('fA').value.trim(),subject:document.getElementById('fSub').value,tag:document.getElementById('fTag').value.trim(),reason:document.getElementById('fReason').value.trim(),status:fmSt,ansImg:null});
    toast('✓ 错题已添加');
  }
  persist();closeAdd();render();
}

// ── STATUS ────────────────────────────────────────────────
function cycleSt(id){
  const x=qs.find(q=>q.id===id);if(!x)return;
  const n={wrong:'review',review:'done',done:'wrong'};
  const l={wrong:'→ 复习中',review:'→ 已掌握',done:'→ 未掌握'};
  toast(l[x.status]);x.status=n[x.status];persist();render();
}
function cycleFromPP(){if(ppId)cycleSt(ppId);}

// ── DELETE ────────────────────────────────────────────────
let pendDel=null;
function askDel(id){
  pendDel=id;
  document.getElementById('dlgTitle').textContent='删除错题';
  document.getElementById('dlgDesc').textContent='这道错题和作答记录将被永久删除，无法恢复。';
  document.getElementById('dlgOk').textContent='删除';
  document.getElementById('dlgOk').onclick=()=>{qs=qs.filter(q=>q.id!==pendDel);persist();render();closeDlg();toast('已删除');};
  document.getElementById('dlgOv').classList.add('open');
}
function closeDlg(){document.getElementById('dlgOv').classList.remove('open');}

// ── EXPORT / IMPORT ───────────────────────────────────────
function doExport(){
  closePop();
  const b=new Blob([JSON.stringify(qs,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`错题本_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.json`;
  a.click();URL.revokeObjectURL(a.href);
  toast('✓ 已导出 '+qs.length+' 道错题');
}
function doImport(input){
  closePop();
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data))throw 0;
      const ids=new Set(qs.map(q=>q.id));
      const newQs=data.filter(x=>x.id&&x.q&&!ids.has(x.id));
      qs=[...newQs,...qs];persist();render();
      toast(`✓ 导入 ${newQs.length} 道（已去重）`);
    }catch{toast('⚠️ 文件格式不正确');}
  };
  r.readAsText(f);input.value='';
}
function askClear(){
  closePop();
  document.getElementById('dlgTitle').textContent='清空全部错题';
  document.getElementById('dlgDesc').textContent='所有错题和作答记录将被永久删除，此操作无法恢复。';
  document.getElementById('dlgOk').textContent='清空';
  document.getElementById('dlgOk').onclick=()=>{qs=[];persist();render();closeDlg();toast('已清空');};
  document.getElementById('dlgOv').classList.add('open');
}

// ── POPOVER ───────────────────────────────────────────────
function togglePop(e){
  e.stopPropagation();
  const p=document.getElementById('pop'),b=document.getElementById('menuBtn'),r=b.getBoundingClientRect();
  p.style.top=(r.bottom+8)+'px';p.style.right=(window.innerWidth-r.right)+'px';
  p.classList.toggle('open');
}
function closePop(){document.getElementById('pop').classList.remove('open');}
document.addEventListener('click',e=>{if(!document.getElementById('pop').contains(e.target))closePop();});

// ── PENCIL PANEL ──────────────────────────────────────────
let drawing=false,strokes=[],curStroke=null,lpx=0,lpy=0;
let penColor='#1C1C1E',penSz=3,penTool='pen',ppId=null;

function openPP(id){
  ppId=id;
  const x=qs.find(q=>q.id===id);if(!x)return;
  document.getElementById('ppQ').textContent=x.q;
  document.getElementById('pp').classList.add('open');
  strokes=[];setTool('pen');
  requestAnimationFrame(()=>{
    initCv();
    if(x.ansImg){const img=new Image();img.onload=()=>document.getElementById('cv').getContext('2d').drawImage(img,0,0);img.src=x.ansImg;}
  });
}
function closePP(){document.getElementById('pp').classList.remove('open');ppId=null;}
function initCv(){
  const wrap=document.querySelector('.cv-wrap'),c=document.getElementById('cv');
  const dpr=window.devicePixelRatio||1,W=wrap.clientWidth,H=wrap.clientHeight;
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);ctx.lineCap='round';ctx.lineJoin='round';
}
function pt(e){
  const r=document.getElementById('cv').getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return{x:s.clientX-r.left,y:s.clientY-r.top};
}
function onDn(e){if(e.touches&&e.touches.length>1)return;e.preventDefault();drawing=true;const p=pt(e);lpx=p.x;lpy=p.y;curStroke={c:penColor,s:penSz,t:penTool,pts:[{x:lpx,y:lpy}]};}
function onMv(e){
  if(!drawing)return;if(e.touches&&e.touches.length>1){endDraw();return;}e.preventDefault();
  const p=pt(e),c=document.getElementById('cv'),ctx=c.getContext('2d');
  if(penTool==='erase'){const er=penSz*6+4;ctx.clearRect(p.x-er/2,p.y-er/2,er,er);}
  else{
    ctx.globalAlpha=penTool==='mark'?0.25:1;
    ctx.strokeStyle=penColor;ctx.lineWidth=penTool==='mark'?penSz*3.5:penSz;
    ctx.beginPath();ctx.moveTo(lpx,lpy);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.globalAlpha=1;
    if(curStroke)curStroke.pts.push({x:p.x,y:p.y});
  }
  lpx=p.x;lpy=p.y;
}
function endDraw(){if(!drawing)return;drawing=false;if(curStroke&&curStroke.pts.length>1)strokes.push(curStroke);curStroke=null;}

const cv=document.getElementById('cv');
cv.addEventListener('mousedown',onDn);cv.addEventListener('mousemove',onMv);cv.addEventListener('mouseup',endDraw);cv.addEventListener('mouseleave',endDraw);
cv.addEventListener('touchstart',onDn,{passive:false});cv.addEventListener('touchmove',onMv,{passive:false});cv.addEventListener('touchend',endDraw);

function redrawAll(){
  const c=document.getElementById('cv'),dpr=window.devicePixelRatio||1;
  const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width/dpr,c.height/dpr);
  strokes.forEach(s=>{if(s.pts.length<2)return;ctx.globalAlpha=s.t==='mark'?0.25:1;ctx.strokeStyle=s.c;ctx.lineWidth=s.t==='mark'?s.s*3.5:s.s;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(s.pts[0].x,s.pts[0].y);s.pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();});
  ctx.globalAlpha=1;
}
function undoLast(){strokes.pop();redrawAll();}
function clearCv(){strokes=[];const c=document.getElementById('cv'),dpr=window.devicePixelRatio||1;c.getContext('2d').clearRect(0,0,c.width/dpr,c.height/dpr);}
function setTool(t){
  penTool=t;
  ['pbPen','pbMark','pbErase'].forEach(id=>document.getElementById(id).classList.remove('on'));
  const m={pen:'pbPen',mark:'pbMark',erase:'pbErase'};if(m[t])document.getElementById(m[t]).classList.add('on');
  document.getElementById('cv').style.cursor=t==='erase'?'cell':'crosshair';
}
function pickColor(c,el){penColor=c;document.querySelectorAll('.pc').forEach(d=>d.classList.remove('on'));el.classList.add('on');if(penTool==='erase')setTool('pen');}
function saveAnswer(){
  if(!ppId)return;const x=qs.find(q=>q.id===ppId);if(!x)return;
  x.ansImg=document.getElementById('cv').toDataURL('image/jpeg',.85);
  if(x.status==='wrong')x.status='review';
  persist();render();toast('✓ 作答已保存');closePP();
}

// ── TOAST ─────────────────────────────────────────────────
let toastT;
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),2300);}

// ── RESIZE ────────────────────────────────────────────────
window.addEventListener('resize',()=>{if(document.getElementById('pp').classList.contains('open')){const s=document.getElementById('cv').toDataURL();initCv();const img=new Image();img.onload=()=>document.getElementById('cv').getContext('2d').drawImage(img,0,0);img.src=s;}});

// ── INIT ──────────────────────────────────────────────────
render();
</script>
</body>
</html>
