<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>错题本</title>
<style>
  :root {
    --bg: #F2F1F6;
    --card: #FFFFFF;
    --border: #E0DFE8;
    --text: #1C1C1E;
    --text2: #6B6B72;
    --text3: #AEAEB2;
    --accent: #4F46E5;
    --accent-light: #EEF2FF;
    --radius: 14px;
    --sidebar: 210px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

  /* TOP BAR */
  .topbar { background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; z-index: 10; }
  .topbar-title { font-size: 17px; font-weight: 600; flex: 1; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { opacity: 0.85; }
  .btn-ghost { background: var(--card); border: 0.5px solid var(--border); color: var(--text); }
  .btn-ghost:active { background: var(--bg); }
  .btn-danger { background: #FEE2E2; color: #991B1B; border: none; }

  /* LAYOUT */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar); background: var(--card); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  .sidebar-section { padding: 14px 10px 6px; }
  .sidebar-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; padding: 0 4px; margin-bottom: 6px; }
  .subject-item { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--text); margin-bottom: 1px; transition: background 0.12s; user-select: none; }
  .subject-item:active { background: var(--border); }
  .subject-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .subject-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .subject-count { margin-left: auto; font-size: 12px; color: var(--text3); }
  .subject-item.active .subject-count { color: var(--accent); }
  .stats-box { margin: 8px 10px 14px; background: var(--bg); border-radius: 12px; padding: 12px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); padding: 3px 0; }
  .stat-val { font-weight: 500; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); background: var(--card); padding: 0 16px; flex-shrink: 0; }
  .tab { padding: 11px 14px; font-size: 14px; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  /* CARDS */
  .cards { flex: 1; overflow-y: auto; padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; align-content: start; -webkit-overflow-scrolling: touch; }
  .card { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
  .card:active { transform: scale(0.98); }
  .card-thumb { height: 90px; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 0.5px solid var(--border); overflow: hidden; }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-thumb-icon { font-size: 30px; opacity: 0.35; }
  .card-badge { position: absolute; top: 8px; left: 8px; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 8px; }
  .badge-wrong { background: #FEE2E2; color: #991B1B; }
  .badge-review { background: #FEF3C7; color: #92400E; }
  .badge-done { background: #D1FAE5; color: #065F46; }
  .card-has-answer { position: absolute; bottom: 8px; right: 8px; font-size: 10px; background: rgba(79,70,229,0.12); color: var(--accent); padding: 2px 7px; border-radius: 6px; font-weight: 500; }
  .card-body { padding: 11px 13px 8px; }
  .card-q { font-size: 13px; line-height: 1.5; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 7px; }
  .card-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-bottom: 10px; }
  .card-actions { display: flex; gap: 6px; padding: 0 10px 10px; }
  .card-btn { flex: 1; text-align: center; padding: 7px 4px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--border); background: var(--bg); color: var(--text2); transition: all 0.12s; user-select: none; }
  .card-btn:active { background: var(--border); }
  .card-btn.accent { background: var(--accent-light); border-color: transparent; color: var(--accent); font-weight: 500; }

  /* EMPTY */
  .empty { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text3); padding: 60px 40px; text-align: center; }
  .empty-icon { font-size: 48px; }
  .empty-title { font-size: 16px; font-weight: 500; color: var(--text2); }
  .empty-desc { font-size: 14px; line-height: 1.6; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px; max-height: 93dvh; overflow: hidden; display: flex; flex-direction: column; }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; flex-shrink: 0; border-bottom: 0.5px solid var(--border); }
  .modal-title { font-size: 17px; font-weight: 600; }
  .modal-close { font-size: 24px; color: var(--text3); cursor: pointer; padding: 2px 6px; line-height: 1; }
  .modal-body { padding: 16px 18px 24px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
  .form-group { margin-bottom: 15px; }
  .form-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 11px 13px; border-radius: 10px; border: 0.5px solid var(--border); background: var(--bg); font-size: 15px; color: var(--text); font-family: inherit; resize: vertical; -webkit-appearance: none; }
  .form-input:focus { outline: none; border-color: var(--accent); background: #fff; }
  select.form-input { cursor: pointer; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .img-upload-area { width: 100%; height: 130px; border-radius: 10px; border: 1.5px dashed var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; cursor: pointer; color: var(--text3); font-size: 14px; overflow: hidden; background: var(--bg); }
  .img-upload-area img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  .ocr-box { background: var(--accent-light); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
  .ocr-box-label { font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 5px; }
  .ocr-box-text { font-size: 14px; color: var(--text); line-height: 1.6; }

  /* PENCIL PANEL */
  .pencil-panel { display: none; position: fixed; inset: 0; background: #1C1C1E; z-index: 200; flex-direction: column; }
  .pencil-panel.open { display: flex; }
  .pencil-topbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #2C2C2E; border-bottom: 0.5px solid #3A3A3C; flex-shrink: 0; }
  .pencil-q-text { flex: 1; font-size: 13px; color: #C7C7CC; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .p-tool { width: 36px; height: 36px; border-radius: 9px; background: #3A3A3C; border: none; color: #E5E5EA; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 17px; flex-shrink: 0; transition: background 0.12s; }
  .p-tool.on { background: var(--accent); }
  .p-tool:active { opacity: 0.7; }
  .canvas-wrap { flex: 1; position: relative; background: #FAFAF8; overflow: hidden; }
  .canvas-wrap canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; cursor: crosshair; display: block; }
  .pencil-footer { background: #2C2C2E; padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; border-top: 0.5px solid #3A3A3C; }
  .color-row { display: flex; gap: 8px; align-items: center; }
  .cdot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: border-color 0.12s; flex-shrink: 0; }
  .cdot.on { border-color: #fff; }
  .size-row { display: flex; align-items: center; gap: 6px; }
  .size-row span { font-size: 12px; color: #8E8E93; }
  .size-row input[type=range] { width: 70px; accent-color: var(--accent); }
  .p-right { margin-left: auto; display: flex; gap: 8px; }

  /* TOAST */
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: rgba(28,28,30,0.9); backdrop-filter: blur(10px); color: #fff; padding: 10px 20px; border-radius: 18px; font-size: 14px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <span style="font-size:20px">📖</span>
  <div class="topbar-title">错题本</div>
  <button class="btn btn-ghost" style="font-size:13px;padding:7px 12px" onclick="exportData()">导出</button>
  <button class="btn btn-primary" onclick="openAdd()">＋ 添加错题</button>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">科目</div>
      <div class="subject-item active" data-s="全部" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#8B8B93"></span>全部
        <span class="subject-count" id="c-全部">0</span>
      </div>
      <div class="subject-item" data-s="数学" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#4F46E5"></span>数学
        <span class="subject-count" id="c-数学">0</span>
      </div>
      <div class="subject-item" data-s="语文" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#0EA5E9"></span>语文
        <span class="subject-count" id="c-语文">0</span>
      </div>
      <div class="subject-item" data-s="英语" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#10B981"></span>英语
        <span class="subject-count" id="c-英语">0</span>
      </div>
      <div class="subject-item" data-s="物理" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#F59E0B"></span>物理
        <span class="subject-count" id="c-物理">0</span>
      </div>
      <div class="subject-item" data-s="化学" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#EF4444"></span>化学
        <span class="subject-count" id="c-化学">0</span>
      </div>
      <div class="subject-item" data-s="生物" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#EC4899"></span>生物
        <span class="subject-count" id="c-生物">0</span>
      </div>
      <div class="subject-item" data-s="其他" onclick="pickSubject(this)">
        <span class="subject-dot" style="background:#A78BFA"></span>其他
        <span class="subject-count" id="c-其他">0</span>
      </div>
    </div>
    <div class="stats-box">
      <div class="sidebar-label" style="padding:0;margin-bottom:8px">本月统计</div>
      <div class="stat-row">未掌握 <span class="stat-val" id="st-wrong" style="color:#EF4444">0</span></div>
      <div class="stat-row">复习中 <span class="stat-val" id="st-review" style="color:#F59E0B">0</span></div>
      <div class="stat-row">已掌握 <span class="stat-val" id="st-done" style="color:#10B981">0</span></div>
      <div class="stat-row" style="margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border)">合计 <span class="stat-val" id="st-total">0</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="tabs">
      <div class="tab active" onclick="pickStatus(this,'all')">全部</div>
      <div class="tab" onclick="pickStatus(this,'wrong')">未掌握</div>
      <div class="tab" onclick="pickStatus(this,'review')">复习中</div>
      <div class="tab" onclick="pickStatus(this,'done')">已掌握</div>
    </div>
    <div class="cards" id="grid"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="addModalTitle">添加错题</div>
      <div class="modal-close" onclick="closeAdd()">×</div>
    </div>
    <div class="modal-body">
      <!-- Image upload -->
      <div class="form-group">
        <label class="form-label">拍照 / 选图（可选）</label>
        <div class="img-upload-area" id="imgArea" onclick="document.getElementById('fileIn').click()">
          <span style="font-size:28px">📷</span>
          <span>点击拍照或从相册选图</span>
          <span style="font-size:12px">iOS 长按图片可复制文字</span>
        </div>
        <input type="file" id="fileIn" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)">
      </div>

      <!-- OCR result -->
      <div id="ocrSection" style="display:none" class="form-group">
        <div class="ocr-box">
          <div class="ocr-box-label">✦ 自动识别的文字（点击使用）</div>
          <div class="ocr-box-text" id="ocrResult"></div>
        </div>
        <button class="btn btn-ghost" style="width:100%;justify-content:center;font-size:14px" onclick="applyOcr()">将识别结果填入题目 ↓</button>
      </div>

      <!-- Question -->
      <div class="form-group">
        <label class="form-label">题目内容 <span style="color:#EF4444">*</span></label>
        <textarea class="form-input" id="fQ" rows="4" placeholder="粘贴或手动输入题目…"></textarea>
      </div>

      <!-- Answer -->
      <div class="form-group">
        <label class="form-label">正确答案 / 解题思路</label>
        <textarea class="form-input" id="fA" rows="3" placeholder="记下正确做法、关键公式或思路…"></textarea>
      </div>

      <!-- Subject + Tag -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">科目</label>
          <select class="form-input" id="fSub">
            <option>数学</option><option>语文</option><option>英语</option>
            <option>物理</option><option>化学</option><option>生物</option><option>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">知识点 / 章节</label>
          <input class="form-input" id="fTag" placeholder="如：二次函数">
        </div>
      </div>

      <!-- Reason -->
      <div class="form-group">
        <label class="form-label">出错原因</label>
        <input class="form-input" id="fReason" placeholder="粗心 / 公式记错 / 概念不清…">
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:13px;border-radius:12px" onclick="saveQ()">保存错题</button>
    </div>
  </div>
</div>

<!-- PENCIL PANEL -->
<div class="pencil-panel" id="pencilPanel">
  <div class="pencil-topbar">
    <div class="pencil-q-text" id="pQText"></div>
    <button class="p-tool on" id="tPen"    onclick="setTool('pen')"    title="钢笔">✏️</button>
    <button class="p-tool"    id="tMark"   onclick="setTool('mark')"   title="荧光笔">🖊</button>
    <button class="p-tool"    id="tErase"  onclick="setTool('erase')"  title="橡皮">⬜</button>
    <button class="p-tool"                 onclick="undoLast()"         title="撤销">↩</button>
    <button class="p-tool"                 onclick="closePencil()"      title="关闭">✕</button>
  </div>
  <div class="canvas-wrap">
    <canvas id="cv"></canvas>
  </div>
  <div class="pencil-footer">
    <div class="color-row">
      <div class="cdot on"  style="background:#1C1C1E" onclick="pickColor('#1C1C1E',this)"></div>
      <div class="cdot"     style="background:#4F46E5" onclick="pickColor('#4F46E5',this)"></div>
      <div class="cdot"     style="background:#EF4444" onclick="pickColor('#EF4444',this)"></div>
      <div class="cdot"     style="background:#10B981" onclick="pickColor('#10B981',this)"></div>
      <div class="cdot"     style="background:#F59E0B" onclick="pickColor('#F59E0B',this)"></div>
    </div>
    <div class="size-row">
      <span>粗细</span>
      <input type="range" min="1" max="18" value="3" id="szSlider" oninput="sz=+this.value">
    </div>
    <div class="p-right">
      <button class="btn btn-ghost" style="font-size:13px;padding:7px 12px;background:#3A3A3C;border-color:#3A3A3C;color:#E5E5EA" onclick="clearCv()">清除</button>
      <button class="btn btn-primary" style="font-size:13px;padding:7px 14px" onclick="saveAnswer()">保存作答 ✓</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const KEY = 'cuoti_v2';
let qs = [];
try { qs = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { qs = []; }

let curSubject = '全部';
let curStatus  = 'all';
let curId      = null;
let addImg     = null;

const subColors = {数学:'#4F46E5',语文:'#0EA5E9',英语:'#10B981',物理:'#F59E0B',化学:'#EF4444',生物:'#EC4899',其他:'#A78BFA'};
const statusCfg = {
  wrong:  { label:'未掌握', cls:'badge-wrong' },
  review: { label:'复习中', cls:'badge-review' },
  done:   { label:'已掌握', cls:'badge-done' }
};

function persist() { localStorage.setItem(KEY, JSON.stringify(qs)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  updateSidebar();
  const list = qs.filter(q => {
    const s = curSubject === '全部' || q.subject === curSubject;
    const t = curStatus  === 'all'  || q.status  === curStatus;
    return s && t;
  }).sort((a,b) => b.at - a.at);

  const grid = document.getElementById('grid');

  if (!list.length) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">📝</div>
      <div class="empty-title">暂无错题</div>
      <div class="empty-desc">点击右上角「添加错题」<br>拍照或粘贴题目即可</div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(q => {
    const sc = subColors[q.subject] || '#8B8B93';
    const st = statusCfg[q.status] || statusCfg.wrong;
    const thumb = q.img
      ? `<img src="${q.img}" alt="题目">`
      : `<span class="card-thumb-icon" style="color:${sc}">📐</span>`;
    return `<div class="card">
      <div class="card-thumb" style="background:${sc}15">
        ${thumb}
        <span class="card-badge ${st.cls}">${st.label}</span>
        ${q.ansImg ? '<span class="card-has-answer">已作答</span>' : ''}
      </div>
      <div class="card-body">
        <div class="card-q">${esc(q.q)}</div>
        <div class="card-meta">
          <span style="color:${sc};font-weight:500">${q.subject}${q.tag?' · '+q.tag:''}</span>
          <span>${ago(q.at)}</span>
        </div>
      </div>
      <div class="card-actions">
        <div class="card-btn accent" onclick="openPencil('${q.id}')">✏️ 作答</div>
        <div class="card-btn" onclick="cycleStatus('${q.id}')">换状态</div>
        <div class="card-btn" onclick="delQ('${q.id}')">🗑</div>
      </div>
    </div>`;
  }).join('');
}

function updateSidebar() {
  const subs = ['全部','数学','语文','英语','物理','化学','生物','其他'];
  subs.forEach(s => {
    const el = document.getElementById('c-'+s);
    if (el) el.textContent = s === '全部' ? qs.length : qs.filter(q=>q.subject===s).length;
  });
  document.getElementById('st-wrong').textContent  = qs.filter(q=>q.status==='wrong').length;
  document.getElementById('st-review').textContent = qs.filter(q=>q.status==='review').length;
  document.getElementById('st-done').textContent   = qs.filter(q=>q.status==='done').length;
  document.getElementById('st-total').textContent  = qs.length;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function ago(ts) {
  const d = Math.floor((Date.now()-ts)/86400000);
  if (d===0) return '今天'; if (d===1) return '昨天';
  if (d<7)   return d+'天前'; if (d<30) return Math.floor(d/7)+'周前';
  return Math.floor(d/30)+'月前';
}

// ══════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════
function pickSubject(el) {
  document.querySelectorAll('.subject-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  curSubject = el.dataset.s;
  render();
}
function pickStatus(el, s) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  curStatus = s;
  render();
}

// ══════════════════════════════════════════
// ADD / SAVE
// ══════════════════════════════════════════
function openAdd() {
  addImg = null;
  ['fQ','fA','fTag','fReason'].forEach(id => document.getElementById(id).value='');
  document.getElementById('imgArea').innerHTML = '<span style="font-size:28px">📷</span><span>点击拍照或从相册选图</span><span style="font-size:12px">iOS 长按图片可复制文字</span>';
  document.getElementById('ocrSection').style.display = 'none';
  document.getElementById('addModal').classList.add('open');
}
function closeAdd() { document.getElementById('addModal').classList.remove('open'); }

function handleImg(input) {
  const f = input.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    addImg = e.target.result;
    document.getElementById('imgArea').innerHTML = `<img src="${addImg}">`;
    runOCR(f);
  };
  reader.readAsDataURL(f);
  input.value = '';
}

async function runOCR(file) {
  try {
    const { createWorker } = await import('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.esm.min.js');
    const worker = await createWorker('chi_sim+eng');
    const { data: { text } } = await worker.recognize(file);
    await worker.terminate();
    const t = text.trim();
    if (t.length > 3) {
      document.getElementById('ocrResult').textContent = t;
      document.getElementById('ocrSection').style.display = 'block';
      showToast('✦ 文字识别完成');
    }
  } catch(e) { /* silent fail */ }
}

function applyOcr() {
  const t = document.getElementById('ocrResult').textContent;
  document.getElementById('fQ').value = t;
  document.getElementById('ocrSection').style.display = 'none';
  document.getElementById('fQ').focus();
}

function saveQ() {
  const q = document.getElementById('fQ').value.trim();
  if (!q) { showToast('请先填写题目内容'); return; }
  qs.unshift({
    id: uid(),
    q,
    a:       document.getElementById('fA').value.trim(),
    subject: document.getElementById('fSub').value,
    tag:     document.getElementById('fTag').value.trim(),
    reason:  document.getElementById('fReason').value.trim(),
    status:  'wrong',
    img:     addImg,
    ansImg:  null,
    at:      Date.now()
  });
  persist();
  closeAdd();
  render();
  showToast('✓ 错题已添加');
}

function delQ(id) {
  if (!confirm('确定删除这道错题？')) return;
  qs = qs.filter(q=>q.id!==id);
  persist(); render(); showToast('已删除');
}

function cycleStatus(id) {
  const q = qs.find(x=>x.id===id); if (!q) return;
  const nxt = {wrong:'review',review:'done',done:'wrong'};
  const lbl = {wrong:'→ 复习中',review:'→ 已掌握',done:'→ 未掌握'};
  showToast(lbl[q.status]);
  q.status = nxt[q.status];
  persist(); render();
}

// ══════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════
function exportData() {
  const data = localStorage.getItem(KEY) || '[]';
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '错题本_' + new Date().toLocaleDateString('zh-CN').replace(/\//g,'-') + '.json';
  a.click();
  showToast('✓ 数据已导出为 JSON 文件');
}

// ══════════════════════════════════════════
// CANVAS / APPLE PENCIL
// ══════════════════════════════════════════
let drawing = false, strokes = [], curStroke = null;
let inkColor = '#1C1C1E', sz = 3, tool = 'pen';
let px = 0, py = 0;

function openPencil(id) {
  curId = id;
  const q = qs.find(x=>x.id===id); if (!q) return;
  document.getElementById('pQText').textContent = q.q;
  document.getElementById('pencilPanel').classList.add('open');
  strokes = [];
  setTool('pen');
  requestAnimationFrame(() => {
    initCv();
    if (q.ansImg) {
      const img = new Image();
      img.onload = () => {
        const c = document.getElementById('cv');
        c.getContext('2d').drawImage(img, 0, 0, c.width/window.devicePixelRatio, c.height/window.devicePixelRatio);
      };
      img.src = q.ansImg;
    }
  });
}

function closePencil() {
  document.getElementById('pencilPanel').classList.remove('open');
  curId = null;
}

function initCv() {
  const wrap = document.querySelector('.canvas-wrap');
  const c = document.getElementById('cv');
  const dpr = window.devicePixelRatio || 1;
  const W = wrap.clientWidth, H = wrap.clientHeight;
  c.width  = W * dpr;
  c.height = H * dpr;
  c.style.width  = W + 'px';
  c.style.height = H + 'px';
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
}

function pt(e) {
  const r = document.getElementById('cv').getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

function onDown(e) {
  e.preventDefault();
  drawing = true;
  const p = pt(e); px = p.x; py = p.y;
  curStroke = { c: inkColor, s: sz, t: tool, pts: [{x:px,y:py}] };
}

function onMove(e) {
  if (!drawing) return;
  e.preventDefault();
  const p = pt(e);
  const ctx = document.getElementById('cv').getContext('2d');
  if (tool === 'erase') {
    const er = sz * 7;
    ctx.clearRect(p.x - er/2, p.y - er/2, er, er);
  } else {
    ctx.globalAlpha = tool === 'mark' ? 0.28 : 1;
    ctx.strokeStyle = inkColor;
    ctx.lineWidth   = tool === 'mark' ? sz * 3.5 : sz;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(p.x, p.y); ctx.stroke();
    ctx.globalAlpha = 1;
    if (curStroke) curStroke.pts.push({x:p.x,y:p.y});
  }
  px = p.x; py = p.y;
}

function onUp() {
  if (!drawing) return;
  drawing = false;
  if (curStroke && curStroke.pts.length > 1) strokes.push(curStroke);
  curStroke = null;
}

const cvEl = document.getElementById('cv');
cvEl.addEventListener('mousedown',  onDown);
cvEl.addEventListener('mousemove',  onMove);
cvEl.addEventListener('mouseup',    onUp);
cvEl.addEventListener('mouseleave', onUp);
cvEl.addEventListener('touchstart', onDown, {passive:false});
cvEl.addEventListener('touchmove',  onMove, {passive:false});
cvEl.addEventListener('touchend',   onUp);

function redrawAll() {
  const c = document.getElementById('cv');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, c.width/dpr, c.height/dpr);
  strokes.forEach(s => {
    if (s.pts.length < 2) return;
    ctx.globalAlpha = s.t === 'mark' ? 0.28 : 1;
    ctx.strokeStyle = s.c;
    ctx.lineWidth   = s.t === 'mark' ? s.s * 3.5 : s.s;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(s.pts[0].x, s.pts[0].y);
    s.pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
  });
  ctx.globalAlpha = 1;
}

function undoLast() { strokes.pop(); redrawAll(); }
function clearCv()  { strokes = []; const c=document.getElementById('cv'); const dpr=window.devicePixelRatio||1; c.getContext('2d').clearRect(0,0,c.width/dpr,c.height/dpr); }

function setTool(t) {
  tool = t;
  ['tPen','tMark','tErase'].forEach(id => document.getElementById(id).classList.remove('on'));
  const m = {pen:'tPen', mark:'tMark', erase:'tErase'};
  if (m[t]) document.getElementById(m[t]).classList.add('on');
  document.getElementById('cv').style.cursor = t === 'erase' ? 'cell' : 'crosshair';
}

function pickColor(c, el) {
  inkColor = c;
  document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('on'));
  el.classList.add('on');
  if (tool === 'erase') setTool('pen');
}

function saveAnswer() {
  if (!curId) return;
  const q = qs.find(x=>x.id===curId); if (!q) return;
  const c = document.getElementById('cv');
  q.ansImg = c.toDataURL('image/jpeg', 0.82);
  if (q.status === 'wrong') q.status = 'review';
  persist(); render();
  showToast('✓ 作答已保存');
  closePencil();
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
render();

// Resize canvas when orientation changes
window.addEventListener('resize', () => {
  if (document.getElementById('pencilPanel').classList.contains('open')) {
    const saved = document.getElementById('cv').toDataURL();
    initCv();
    const img = new Image();
    img.onload = () => document.getElementById('cv').getContext('2d').drawImage(img, 0, 0);
    img.src = saved;
  }
});
</script>
