name: Integrate transparent PNG illustrations

on:
  push:
    branches:
      - agent/transparent-png-assets
    paths:
      - .github/workflows/use-transparent-png.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/transparent-png-assets
          fetch-depth: 0

      - name: Replace illustration paths and polish integration
        shell: python
        run: |
          from pathlib import Path

          files = [Path('index.html'), Path('math.html'), Path('english.html'), Path('reliability.css')]
          replacements = {
              'assets/cats/home-study.svg': 'assets/cats/home-study.png',
              'assets/cats/english-study.svg': 'assets/cats/english-study.png',
              'assets/cats/math-banner.svg': 'assets/cats/math-banner.png',
              'assets/cats/side-sleep.svg': 'assets/cats/side-sleep.png',
              'assets/cats/cheer.svg': 'assets/cats/cheer.png',
              'assets/cats/cat-book.svg': 'assets/cats/cat-book.png',
          }
          for path in files:
              text = path.read_text(encoding='utf-8')
              for old, new in replacements.items():
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')

          html_replacements = {
              'index.html': {
                  '<img class="hero-art" src="assets/cats/home-study.png" alt="嘟嘟猫学习">': '<img class="hero-art" src="assets/cats/home-study.png" alt="嘟嘟猫学习" width="650" height="510" decoding="async" fetchpriority="high">',
                  '<img class="left-cat" src="assets/cats/side-sleep.png" alt="">': '<img class="left-cat" src="assets/cats/side-sleep.png" alt="" width="320" height="190" loading="lazy" decoding="async">',
                  '<img class="right-cat" src="assets/cats/cheer.png" alt="">': '<img class="right-cat" src="assets/cats/cheer.png" alt="" width="190" height="231" loading="lazy" decoding="async">',
              },
              'math.html': {
                  '<img class="side-cat" src="assets/cats/side-sleep.png" alt="陪伴学习的小猫">': '<img class="side-cat" src="assets/cats/side-sleep.png" alt="陪伴学习的小猫" width="320" height="190" loading="lazy" decoding="async">',
                  '<img src="assets/cats/math-banner.png" alt="嘟嘟猫">': '<img src="assets/cats/math-banner.png" alt="嘟嘟猫" width="560" height="448" decoding="async" fetchpriority="high">',
                  '<img src="assets/cats/cheer.png" alt="加油">': '<img src="assets/cats/cheer.png" alt="加油" width="190" height="231" loading="lazy" decoding="async">',
              },
              'english.html': {
                  '<img class="eng-side-cat" src="assets/cats/side-sleep.png" alt="陪伴学习的小猫">': '<img class="eng-side-cat" src="assets/cats/side-sleep.png" alt="陪伴学习的小猫" width="320" height="190" loading="lazy" decoding="async">',
                  '<img src="assets/cats/english-study.png" alt="戴耳机学习英语的小猫">': '<img src="assets/cats/english-study.png" alt="戴耳机学习英语的小猫" width="620" height="459" decoding="async" fetchpriority="high">',
                  '<img src="assets/cats/cheer.png" alt="">': '<img src="assets/cats/cheer.png" alt="" width="190" height="231" loading="lazy" decoding="async">',
                  '<img src="assets/cats/cat-book.png" alt="">': '<img src="assets/cats/cat-book.png" alt="" width="520" height="327" loading="lazy" decoding="async">',
              },
          }
          for filename, mapping in html_replacements.items():
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              for old, new in mapping.items():
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')

          css = Path('reliability.css')
          text = css.read_text(encoding='utf-8')
          marker = '/* transparent-png-integration */'
          if marker not in text:
              text += '''

/* transparent-png-integration */
.hero-art,.left-cat,.right-cat,.side-cat,.eng-side-cat,.welcome img,.eng-hero>img,.challenge img,.eng-stats strong.star img,.words-title>img{
  object-fit:contain;
  background:transparent!important;
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
  filter:drop-shadow(0 14px 22px rgba(77,64,143,.14));
}
.hero-art,.welcome img,.eng-hero>img{height:auto;max-width:42%;}
.left-cat,.right-cat,.side-cat,.eng-side-cat{height:auto;}
.challenge img,.eng-stats strong.star img,.words-title>img{height:auto;}
.hero-art,.welcome img,.eng-hero>img{animation:dudu-float 5.5s ease-in-out infinite;transform-origin:center bottom;}
.subject-card,.quick-actions button,.mode-strip button{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;}
.subject-card:hover,.quick-actions button:hover,.mode-strip button:hover{transform:translateY(-2px);}
@keyframes dudu-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@media(max-width:900px){.hero-art,.welcome img,.eng-hero>img{max-width:38%;}.left-cat,.right-cat{opacity:.7}.side-cat,.eng-side-cat{max-width:180px}}
@media(max-width:680px){.hero-art,.welcome img,.eng-hero>img{max-width:46%;filter:drop-shadow(0 8px 14px rgba(77,64,143,.12))}.left-cat,.right-cat{display:none}.side-cat,.eng-side-cat{max-width:140px}.challenge img{max-width:58px}.words-title>img{max-width:70px}}
@media(prefers-reduced-motion:reduce){.hero-art,.welcome img,.eng-hero>img{animation:none}.subject-card,.quick-actions button,.mode-strip button{transition:none}}
'''
          css.write_text(text, encoding='utf-8')

          for name in replacements:
              old = Path(name)
              if old.exists():
                  old.unlink()

          workflow = Path('.github/workflows/use-transparent-png.yml')
          if workflow.exists():
              workflow.unlink()

      - name: Commit integrated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use transparent PNG illustrations across the site"
          git push origin HEAD:agent/transparent-png-assets
